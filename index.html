
<!DOCTYPE html>
<html>
<head>
  <title>Dating App PRO+</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

  <style>
    body { margin:0; font-family:sans-serif; background:#f2f2f2; }

    .screen { display:none; padding:10px; }
    .active { display:block; }

    .card {
      position:absolute;
      width:90%;
      left:5%;
      top:100px;
      background:white;
      border-radius:15px;
      text-align:center;
      padding:10px;
    }

    .nav {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      background:white;
    }

    .nav button { flex:1; }

    #messages {
      height:300px;
      overflow:auto;
      background:#fff;
      padding:10px;
      border-radius:10px;
    }

    .me {
      text-align:right;
      background:#ff4d6d;
      color:white;
      padding:8px;
      border-radius:10px;
      margin:5px;
      display:inline-block;
    }

    .other {
      text-align:left;
      background:#ddd;
      padding:8px;
      border-radius:10px;
      margin:5px;
      display:inline-block;
    }

    img { border-radius:10px; max-width:150px; }
  </style>
</head>

<body>

<div id="login" class="screen active">
  <h2>Login</h2>
  <input id="name" placeholder="Enter name">
  <button onclick="login()">Start</button>
</div>

<div id="home" class="screen">
  <h2>Discover</h2>
  <div id="cards"></div>
</div>

<div id="matches" class="screen">
  <h2>Matches</h2>
  <div id="matchList"></div>
</div>

<div id="chat" class="screen">
  <h2>Chat</h2>
  <div id="messages"></div>

  <input id="msg">
  <button onclick="sendMsg()">Send</button>

  <input type="file" id="imgFile">
  <button onclick="sendImage()">📸</button>

  <button onclick="startRecording()">🎤 Record</button>
  <button onclick="stopRecording()">Stop</button>
</div>

<div id="profile" class="screen">
  <h2>Profile</h2>
  <input type="file" id="file">
  <button onclick="upload()">Upload</button>
</div>

<div class="nav">
  <button onclick="show('home')">Home</button>
  <button onclick="show('matches')">Matches</button>
  <button onclick="show('profile')">Profile</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET"
};

firebase.initializeApp(firebaseConfig);
let db = firebase.database();
let storage = firebase.storage();

let currentUserId="";
let chatUser="";
let mediaRecorder;
let audioChunks=[];

// LOGIN
function login(){
  let name=document.getElementById("name").value;
  currentUserId="user_"+Date.now();

  db.ref("users/"+currentUserId).set({
    name:name
  });

  loadCards();
  show("home");

  Notification.requestPermission();
}

// SCREEN
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// USERS
function loadCards(){
  db.ref("users").on("value",snap=>{
    let data=snap.val();
    let html="";

    for(let uid in data){
      if(uid!==currentUserId){
        html+=`
        <div class="card">
          <h3>${data[uid].name}</h3>
          <button onclick="like('${uid}')">❤️</button>
        </div>`;
      }
    }

    document.getElementById("cards").innerHTML=html;
  });
}

// LIKE
function like(uid){
  db.ref("likes/"+currentUserId+"/"+uid).set(true);

  db.ref("likes/"+uid+"/"+currentUserId).once("value",snap=>{
    if(snap.exists()){
      db.ref("matches/"+currentUserId+"/"+uid).set(true);
      db.ref("matches/"+uid+"/"+currentUserId).set(true);
      alert("🔥 Match!");
    }
  });
}

// MATCH LIST
db.ref("matches").on("value",snap=>{
  let data=snap.val()?.[currentUserId];
  let html="";

  for(let uid in data){
    db.ref("users/"+uid).once("value",s=>{
      html+=`<div onclick="openChat('${uid}')">${s.val().name}</div>`;
      document.getElementById("matchList").innerHTML=html;
    });
  }
});

// CHAT
function openChat(uid){
  chatUser=uid;
  show("chat");

  db.ref("chats/"+getChatId()).on("value",snap=>{
    let data=snap.val();
    let html="";

    for(let id in data){
      let m=data[id];

      if(m.type==="text"){
        html+=`<div class="${m.sender===currentUserId?"me":"other"}">${m.text}</div>`;
      }

      if(m.type==="img"){
        html+=`<img src="${m.url}">`;
      }

      if(m.type==="audio"){
        html+=`<audio controls src="${m.url}"></audio>`;
      }
    }

    document.getElementById("messages").innerHTML=html;
  });
}

// TEXT
function sendMsg(){
  let text=document.getElementById("msg").value;

  db.ref("chats/"+getChatId()).push({
    sender:currentUserId,
    text:text,
    type:"text"
  });

  notify("New Message!");
}

// IMAGE
function sendImage(){
  let file=document.getElementById("imgFile").files[0];
  let ref=storage.ref("chat/"+file.name);

  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{
      db.ref("chats/"+getChatId()).push({
        sender:currentUserId,
        url:url,
        type:"img"
      });
    });
  });
}

// VOICE
async function startRecording(){
  let stream=await navigator.mediaDevices.getUserMedia({audio:true});
  mediaRecorder=new MediaRecorder(stream);

  mediaRecorder.start();
  audioChunks=[];

  mediaRecorder.ondataavailable=e=>{
    audioChunks.push(e.data);
  };
}

function stopRecording(){
  mediaRecorder.stop();

  mediaRecorder.onstop=()=>{
    let blob=new Blob(audioChunks);
    let ref=storage.ref("voice/"+Date.now()+".webm");

    ref.put(blob).then(()=>{
      ref.getDownloadURL().then(url=>{
        db.ref("chats/"+getChatId()).push({
          sender:currentUserId,
          url:url,
          type:"audio"
        });
      });
    });
  };
}

// CHAT ID
function getChatId(){
  return currentUserId<chatUser
    ? currentUserId+"_"+chatUser
    : chatUser+"_"+currentUserId;
}

// PROFILE PIC
function upload(){
  let file=document.getElementById("file").files[0];
  let ref=storage.ref("profiles/"+file.name);

  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{
      db.ref("users/"+currentUserId).update({photo:url});
    });
  });
}

// NOTIFICATION
function notify(text){
  if(Notification.permission==="granted"){
    new Notification(text);
  }
}
</script>

</body>
</html>
