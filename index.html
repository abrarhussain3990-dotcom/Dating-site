<!DOCTYPE html>
<html>
<head>
  <title>💖 Dating App FINAL PRO ULTRA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; background: #ece5dd; }
    header { background: #ff4d6d; color: white; padding: 15px; text-align: center; }

    .top { padding: 10px; display: flex; gap: 5px; background: #fff; }
    .top input { flex: 1; padding: 10px; }

    .container { display: flex; height: calc(100vh - 120px); }

    #usersPanel {
      width: 35%; background: white; overflow-y: auto;
    }

    #usersPanel div {
      padding: 10px; border-bottom: 1px solid #eee;
      cursor: pointer; display: flex; align-items: center; gap: 10px;
    }

    #usersPanel img {
      width: 40px; height: 40px; border-radius: 50%;
    }

    #chatPanel { width: 65%; display: flex; flex-direction: column; }

    #chat { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }

    .msg { padding: 10px; margin: 5px; border-radius: 12px; max-width: 70%; }
    .me { background: #ff4d6d; color: white; align-self: flex-end; }
    .other { background: #fff; align-self: flex-start; }

    #inputArea { display: flex; padding: 10px; gap: 5px; flex-wrap: wrap; }

    input { padding: 10px; border-radius: 20px; border: 1px solid #ccc; }

    button {
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    video { width: 100px; margin: 5px; }
  </style>
</head>

<body>

<header>💖 Dating App ULTRA</header>

<div class="top">
  <input id="name" placeholder="Enter name">
  <button onclick="addUser()">Enter</button>
</div>

<div class="container">
  <div id="usersPanel"></div>

  <div id="chatPanel">
    <div id="chatHeader">Select user</div>
    <div id="chat"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Message" onkeypress="handleEnter(event)">
      <button onclick="sendMsg()">Send</button>

      <!-- VOICE -->
      <button onclick="startRecording()">🎤</button>

      <!-- CALL -->
      <button onclick="startCall()">📞</button>
      <button onclick="endCall()">❌</button>
    </div>

    <video id="localVideo" autoplay muted></video>
    <video id="remoteVideo" autoplay></video>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "lovedatingapp-70584.firebaseapp.com",
  projectId: "lovedatingapp-70584",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";
let selectedUser = "";

// USER
function addUser() {
  let name = document.getElementById("name").value.trim();
  if (!name) return;

  currentUser = name;

  db.collection("users").doc(name).set({ name });
}

// USERS
db.collection("users").onSnapshot(snap => {
  let div = document.getElementById("usersPanel");
  div.innerHTML = "";

  snap.forEach(doc => {
    let u = doc.data();
    if (u.name === currentUser) return;

    div.innerHTML += `
      <div onclick="selectUser('${u.name}')">
        <b>${u.name}</b>
      </div>
    `;
  });
});

function selectUser(u) {
  selectedUser = u;
  document.getElementById("chatHeader").innerText = u;
  loadChat();
}

// TEXT MSG
function sendMsg() {
  let msg = document.getElementById("msg").value;
  if (!msg || !selectedUser) return;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    text: msg,
    type: "text",
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

function handleEnter(e) {
  if (e.key === "Enter") sendMsg();
}

//
// 🎤 VOICE MESSAGE
//
let mediaRecorder;
let audioChunks = [];

function startRecording() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {

    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.start();

    audioChunks = [];

    mediaRecorder.ondataavailable = e => {
      audioChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      let blob = new Blob(audioChunks);
      let reader = new FileReader();

      reader.onloadend = () => {
        db.collection("messages").add({
          from: currentUser,
          to: selectedUser,
          audio: reader.result,
          type: "audio",
          time: Date.now()
        });
      };

      reader.readAsDataURL(blob);
    };

    setTimeout(() => mediaRecorder.stop(), 3000);
  });
}

//
// 📞 VIDEO CALL (BASIC)
//
let pc = new RTCPeerConnection();

async function startCall() {
  let stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });

  document.getElementById("localVideo").srcObject = stream;

  stream.getTracks().forEach(track => pc.addTrack(track, stream));

  pc.ontrack = e => {
    document.getElementById("remoteVideo").srcObject = e.streams[0];
  };

  let offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  db.collection("calls").doc(selectedUser).set({ offer });
}

db.collection("calls").onSnapshot(async snap => {
  snap.forEach(async doc => {
    let data = doc.data();

    if (data.offer && doc.id === currentUser) {
      await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

      let answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      db.collection("calls").doc(selectedUser).set({ answer });
    }

    if (data.answer && doc.id === selectedUser) {
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
    }
  });
});

function endCall() {
  pc.close();
  alert("Call Ended");
}

// LOAD CHAT
function loadChat() {
  db.collection("messages").orderBy("time").onSnapshot(snap => {
    let div = document.getElementById("chat");
    div.innerHTML = "";

    snap.forEach(doc => {
      let m = doc.data();

      if (
        (m.from === currentUser && m.to === selectedUser) ||
        (m.from === selectedUser && m.to === currentUser)
      ) {
        let cls = m.from === currentUser ? "me" : "other";

        let content = "";

        if (m.type === "text") content = m.text;
        else if (m.type === "audio") content = `<audio controls src="${m.audio}"></audio>`;

        div.innerHTML += `<div class="msg ${cls}">${content}</div>`;
      }
    });
  });
}
</script>

</body>
</html>
