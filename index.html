<!DOCTYPE html>
<html>
<head>
  <title>Dating App 💖</title>

  <style>
    body { font-family: Arial; background:#f2f2f2; text-align:center; }

    .card {
      width: 280px;
      margin: 20px auto;
      border-radius: 20px;
      background: white;
      padding: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      position: relative;
    }

    img { width:100%; border-radius:15px; }

    .online {
      width:12px;
      height:12px;
      background:green;
      border-radius:50%;
      position:absolute;
      top:10px;
      right:10px;
    }

    button { padding:10px; border:none; border-radius:20px; margin:5px; }

    .like { background: hotpink; color:white; }
    .nope { background: gray; color:white; }

    #app, #chatScreen { display:none; }

    #chatBox {
      height:300px;
      overflow-y:scroll;
      background:white;
      padding:10px;
    }

    .msg { padding:8px; margin:5px; border-radius:10px; max-width:70%; }
    .me { background:hotpink; color:white; margin-left:auto; }
    .other { background:#eee; margin-right:auto; }
  </style>
</head>

<body>

<h2>💖 Create Profile</h2>

<input id="nameInput" placeholder="Your Name"><br><br>
<input type="file" id="file"><br><br>

<button onclick="createProfile()">Start</button>
<button onclick="addFakeUsers()">Add 100 Users</button>

<div id="app">
  <div class="card">
    <div id="onlineDot" class="online"></div>
    <img id="photo">
    <h3 id="name"></h3>
    <small id="status"></small>
  </div>

  <button class="nope" onclick="skip()">❌</button>
  <button class="like" onclick="like()">❤️</button>
</div>

<div id="chatScreen">
  <h2>💬 Chat</h2>
  <div id="chatBox"></div>
  <input id="msg">
  <button onclick="sendMsg()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, doc, setDoc,
  updateDoc, arrayUnion, getDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGOFD_ukCDkeg5FPf8z_nP7yAzCZXCV7o",
  authDomain: "dating-app-21c55.firebaseapp.com",
  projectId: "dating-app-21c55",
  storageBucket: "dating-app-21c55.firebasestorage.app",
  messagingSenderId: "101828106221",
  appId: "1:101828106221:web:a688cefbcfb1541a79f9e4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let userId = "user_" + Math.random().toString(36).slice(2);
let users = [];
let index = 0;
let chatId = "";

// CREATE PROFILE
window.createProfile = async () => {
  const name = document.getElementById("nameInput").value;
  const file = document.getElementById("file").files[0];

  if (!name || !file) return alert("Name aur photo zaroori hai");

  const reader = new FileReader();
  reader.onload = async function(e) {
    await setDoc(doc(db, "users", userId), {
      uid: userId,
      name,
      photo: e.target.result,
      likes: [],
      online: true,
      lastSeen: Date.now()
    });

    document.getElementById("app").style.display = "block";
    loadUsers();
  };

  reader.readAsDataURL(file);
};

// ADD FAKE USERS
window.addFakeUsers = async () => {
  for (let i = 1; i <= 100; i++) {
    await setDoc(doc(db, "users", "fake_" + i), {
      uid: "fake_" + i,
      name: "User " + i,
      photo: i % 2
        ? "https://randomuser.me/api/portraits/men/" + (i % 99) + ".jpg"
        : "https://randomuser.me/api/portraits/women/" + (i % 99) + ".jpg",
      likes: [],
      online: Math.random() > 0.5,
      lastSeen: Date.now() - Math.floor(Math.random()*10000000)
    });
  }

  alert("100 Users Added 🔥");
};

// LOAD USERS
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  users = snap.docs.map(d => d.data());
  showUser();
}

// SHOW USER
function showUser() {
  const u = users[index];

  if (!u || u.uid === userId) {
    index++;
    return showUser();
  }

  document.getElementById("photo").src = u.photo;
  document.getElementById("name").innerText = u.name;

  const onlineDot = document.getElementById("onlineDot");
  const status = document.getElementById("status");

  if (u.online) {
    onlineDot.style.display = "block";
    status.innerText = "Online 🟢";
  } else {
    onlineDot.style.display = "none";
    const mins = Math.floor((Date.now() - u.lastSeen)/60000);
    status.innerText = "Last seen " + mins + " min ago";
  }
}

// LIKE
window.like = async () => {
  const target = users[index];

  await updateDoc(doc(db, "users", userId), {
    likes: arrayUnion(target.uid)
  });

  chatId = userId + "_" + target.uid;
  alert("💖 MATCH!");
  openChat();

  index++;
  showUser();
};

// SKIP
window.skip = () => {
  index++;
  showUser();
};

// CHAT
function openChat() {
  document.getElementById("app").style.display = "none";
  document.getElementById("chatScreen").style.display = "block";

  onSnapshot(doc(db, "chats", chatId), (snap) => {
    const box = document.getElementById("chatBox");
    box.innerHTML = "";

    if (snap.exists()) {
      snap.data().messages?.forEach(m => {
        const d = document.createElement("div");
        d.className = "msg " + (m.sender === userId ? "me" : "other");
        d.innerText = m.text;
        box.appendChild(d);
      });
    }
  });
}

// SEND + AUTO REPLY
window.sendMsg = async () => {
  const text = document.getElementById("msg").value;

  await setDoc(doc(db, "chats", chatId), {
    messages: arrayUnion({ sender: userId, text })
  }, { merge: true });

  document.getElementById("msg").value = "";

  setTimeout(async () => {
    const replies = ["Hi 😊","How are you?","Nice 💖","Where from?","😍"];
    const reply = replies[Math.floor(Math.random()*replies.length)];

    await setDoc(doc(db, "chats", chatId), {
      messages: arrayUnion({ sender: "bot", text: reply })
    }, { merge: true });

  }, 1500);
};

</script>

</body>
</html>
