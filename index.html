
<!DOCTYPE html>
<html>
<head>
  <title>Dating App Final</title>
  <style>
    body{font-family:Arial;background:#0a0a0a;color:white;text-align:center;}
    .nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#111;padding:10px;}
    .box{display:none;}
    .active{display:block;}
    img{width:120px;height:120px;border-radius:50%;}
    #chat{height:200px;overflow:auto;background:#000;}
  </style>
</head>
<body>

<h2>💘 Dating App</h2>

<!-- MATCH -->
<div id="match" class="box active">
  <h3 id="uName"></h3>
  <img id="uImg"><p id="uInfo"></p>
  <button onclick="like()">❤️ Like</button>
  <button onclick="next()">❌ Skip</button>
</div>

<!-- PROFILE -->
<div id="profile" class="box">
  <h3>Profile</h3>
  <input id="name" placeholder="Name"><br>
  <input type="file" id="file"><br><br>
  <button onclick="saveProfile()">Save</button>
</div>

<!-- CHAT -->
<div id="chatBox" class="box">
  <h3>Chat</h3>
  <div id="chat"></div>
  <input id="msg">
  <button onclick="sendMsg()">Send</button>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="show('match')">Match</button>
  <button onclick="show('profile')">Profile</button>
  <button onclick="show('chatBox')">Chat</button>
</div>

<!-- FIREBASE (COMPAT VERSION) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBGOFD_ukCDkeg5FPf8z_nP7yAzCZXCV7o",
  authDomain: "dating-app-21c55.firebaseapp.com",
  projectId: "dating-app-21c55",
  storageBucket: "dating-app-21c55.firebasestorage.app",
  messagingSenderId: "101828106221",
  appId: "1:101828106221:web:eeceae2518d4739879f9e4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user={}, users=[], i=0, matchUser=null, imgData="";

/* NAV */
function show(id){
  document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* IMAGE */
file.onchange=e=>{
  let reader=new FileReader();
  reader.onload=()=>imgData=reader.result;
  reader.readAsDataURL(e.target.files[0]);
};

/* SAVE PROFILE */
async function saveProfile(){
  user={name:name.value,photo:imgData};
  await db.collection("users").add(user);
  alert("Profile Saved!");
  loadUsers();
}

/* LOAD USERS + FAKE */
async function loadUsers(){
  let snap=await db.collection("users").get();
  users=snap.docs.map(d=>d.data());

  if(users.length<3){
    users.push(
      {name:"Ayesha",photo:"https://randomuser.me/api/portraits/women/1.jpg"},
      {name:"Sara",photo:"https://randomuser.me/api/portraits/women/2.jpg"},
      {name:"Hina",photo:"https://randomuser.me/api/portraits/women/3.jpg"}
    );
  }

  showUser();
}

/* SHOW USER */
function showUser(){
  let u=users[i];
  if(!u) return;
  uName.innerText=u.name;
  uImg.src=u.photo;
  uInfo.innerText="Tap Like to Match";
}

/* NEXT */
function next(){
  i++; if(i>=users.length) i=0;
  showUser();
}

/* LIKE + MATCH */
function like(){
  matchUser=users[i];
  alert("💘 Match with "+matchUser.name);
  show("chatBox");
  listenChat();
}

/* SEND MSG */
function sendMsg(){
  db.collection("messages").add({
    from:user.name,
    to:matchUser.name,
    text:msg.value,
    time:Date.now()
  });

  chat.innerHTML+=`<p><b>You:</b> ${msg.value}</p>`;
  msg.value="";
  autoReply();
}

/* AUTO REPLY */
function autoReply(){
  let replies=["Hi 😊","Kya kar rahe ho?","Nice to meet you 💕","Busy thi"];
  let r=replies[Math.floor(Math.random()*replies.length)];

  setTimeout(()=>{
    db.collection("messages").add({
      from:matchUser.name,
      to:user.name,
      text:r,
      time:Date.now()
    });
  },2000);
}

/* LISTEN CHAT */
function listenChat(){
  db.collection("messages").orderBy("time")
  .onSnapshot(snap=>{
    chat.innerHTML="";
    snap.forEach(d=>{
      let m=d.data();
      if(m.from==user.name||m.to==user.name){
        chat.innerHTML+=`<p><b>${m.from}:</b> ${m.text}</p>`;
      }
    });
  });
}
</script>

</body>
</html>
