<!DOCTYPE html>
<html>
<head>
  <title>💖 Dating App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; background: #ece5dd; }

    header {
      background: #ff4d6d;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .top {
      padding: 10px;
      display: flex;
      gap: 5px;
      background: #fff;
    }

    .top input { flex: 1; padding: 10px; }

    .container {
      display: flex;
      height: calc(100vh - 100px);
    }

    #usersPanel {
      width: 35%;
      background: white;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }

    #usersPanel div {
      padding: 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    #usersPanel div.active { background: #ffe0e6; }

    .online { color: green; font-size: 11px; }
    .offline { color: gray; font-size: 11px; }

    #chatPanel {
      width: 65%;
      display: flex;
      flex-direction: column;
    }

    #chatHeader {
      padding: 10px;
      background: #f0f0f0;
      border-bottom: 1px solid #ddd;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 12px;
      max-width: 70%;
    }

    .me {
      background: #ff4d6d;
      color: white;
      align-self: flex-end;
    }

    .other {
      background: #fff;
      align-self: flex-start;
    }

    .time {
      font-size: 10px;
      opacity: 0.6;
      display: block;
    }

    img.chat-img {
      max-width: 150px;
      border-radius: 10px;
      margin-top: 5px;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #f0f0f0;
      gap: 5px;
    }

    #msg {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 50%;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      #usersPanel { width: 100%; height: 40%; }
      #chatPanel { width: 100%; height: 60%; }
    }
  </style>
</head>

<body>

<header>💖 Dating App</header>

<div class="top">
  <input id="name" placeholder="Enter your name">
  <button onclick="addUser()">✔</button>
</div>

<div class="container">
  <div id="usersPanel"></div>

  <div id="chatPanel">
    <div id="chatHeader">Select user</div>
    <div id="chat"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Type message">
      <input type="file" id="imgInput" hidden>
      <button onclick="sendMsg()">➤</button>
      <button onclick="pickImage()">📷</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBy5mWexTkc05_NNEBo6Kore8Ur1YtC6cU",
  authDomain: "lovedatingapp-70584.firebaseapp.com",
  projectId: "lovedatingapp-70584",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";
let selectedUser = "";

// TIME
function formatTime(ts) {
  let d = new Date(ts);
  return d.getHours() + ":" + String(d.getMinutes()).padStart(2, "0");
}

// 🔥 GLOBAL REALTIME LISTENER (IMPORTANT FIX)
db.collection("messages")
.orderBy("time")
.onSnapshot(snapshot => {

  if (!currentUser) return;

  let chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = "";

  snapshot.forEach(doc => {
    let m = doc.data();

    // 🔥 IMPORTANT: message always receive ho
    if (
      (m.from === currentUser && m.to === selectedUser) ||
      (m.from === selectedUser && m.to === currentUser)
    ) {

      let cls = m.from === currentUser ? "me" : "other";

      let html = "";
      if (m.type === "text") {
        html = m.text;
      } else if (m.type === "img") {
        html = `<img src="${m.img}" class="chat-img">`;
      }

      chatDiv.innerHTML += `
        <div class="msg ${cls}">
          ${html}
          <span class="time">${formatTime(m.time)}</span>
        </div>
      `;
    }
  });

  chatDiv.scrollTop = chatDiv.scrollHeight;
});

// ONLINE
setInterval(() => {
  if (currentUser) {
    db.collection("users").doc(currentUser).update({
      online: true
    });
  }
}, 5000);

// ADD USER
function addUser() {
  let input = document.getElementById("name");
  let name = input.value.trim();

  if (!name) return alert("Enter name!");
  if (currentUser) return;

  currentUser = name;

  db.collection("users").doc(name).set({
    name,
    online: true
  });

  input.disabled = true;
}

// USERS LIST
db.collection("users").onSnapshot(snapshot => {
  let usersDiv = document.getElementById("usersPanel");
  usersDiv.innerHTML = "";

  snapshot.forEach(doc => {
    let u = doc.data();
    if (u.name === currentUser) return;

    usersDiv.innerHTML += `
      <div onclick="selectUser('${u.name}', this)">
        <b>${u.name}</b>
      </div>
    `;
  });
});

// SELECT USER
function selectUser(user, el) {
  selectedUser = user;
  document.getElementById("chatHeader").innerText = user;

  document.querySelectorAll("#usersPanel div").forEach(d => d.classList.remove("active"));
  el.classList.add("active");
}

// SEND TEXT
function sendMsg() {
  let input = document.getElementById("msg");
  let msg = input.value.trim();

  if (!msg || !selectedUser) return;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    text: msg,
    type: "text",
    time: Date.now()
  });

  input.value = "";
}

// PICK IMAGE
function pickImage() {
  document.getElementById("imgInput").click();
}

// SEND IMAGE (FIXED 🔥)
document.getElementById("imgInput").addEventListener("change", function(e) {
  let file = e.target.files[0];
  if (!file || !selectedUser) return;

  let reader = new FileReader();

  reader.onload = function() {
    db.collection("messages").add({
      from: currentUser,
      to: selectedUser,
      img: reader.result,
      type: "img",
      time: Date.now()
    });
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
