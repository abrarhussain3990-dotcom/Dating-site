<!DOCTYPE html>
<html>
<body>

<h2>Fixed App ✅</h2>

<input id="name" placeholder="Name"><br><br>
<input type="file" id="photo"><br><br>
<button onclick="go()">Enter</button>

<p id="s"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGOFD_ukCDkeg5FPf8z_nP7yAzCZXCV7o",
  authDomain: "dating-app-21c55.firebaseapp.com",
  projectId: "dating-app-21c55",
  storageBucket: "dating-app-21c55.firebasestorage.app",
  messagingSenderId: "101828106221",
  appId: "1:101828106221:web:cdabb70a284a945879f9e4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.go = async function(){

  const s = document.getElementById("s");
  const name = document.getElementById("name").value;
  const file = document.getElementById("photo").files[0];

  if(!name || !file){
    s.innerText = "❌ Name + photo required";
    return;
  }

  s.innerText = "⏳ Reading file...";

  const reader = new FileReader();

  reader.onload = async () => {
    try {
      s.innerText = "⏳ Sending to Firebase...";

      // TIMEOUT PROTECTION
      const timeout = new Promise((_, reject) =>
        setTimeout(() => reject(new Error("Timeout ❌ Firebase slow/blocked")), 5000)
      );

      await Promise.race([
        addDoc(collection(db, "users"), {
          name: name,
          photo: reader.result
        }),
        timeout
      ]);

      s.innerText = "✅ SUCCESS BRO 🔥";

    } catch(e){
      s.innerText = "❌ ERROR: " + e.message;
      console.error(e);
    }
  };

  reader.onerror = () => {
    s.innerText = "❌ File read error";
  };

  reader.readAsDataURL(file);
};

</script>

</body>
</html>
