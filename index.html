
<!DOCTYPE html>
<html>
<head>
  <title>💖 Dating App FINAL PRO ULTRA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; background: #ece5dd; transition: 0.3s; }
    .dark { background: #1e1e1e; color: white; }

    header {
      background: #ff4d6d;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .top {
      padding: 10px;
      display: flex;
      gap: 5px;
      background: #fff;
    }

    .dark .top { background: #2c2c2c; }

    .top input { flex: 1; padding: 10px; }

    .container { display: flex; height: calc(100vh - 120px); }

    #usersPanel {
      width: 35%;
      background: white;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }

    .dark #usersPanel { background: #2c2c2c; }

    #usersPanel div {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #usersPanel img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    #chatPanel { width: 65%; display: flex; flex-direction: column; }

    #chat { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }

    .msg { padding: 10px; margin: 5px; border-radius: 12px; max-width: 70%; }

    .me { background: #ff4d6d; color: white; align-self: flex-end; }
    .other { background: #fff; align-self: flex-start; }

    .dark .other { background: #444; color: white; }

    .chat-img {
      max-width: 150px;
      border-radius: 10px;
      margin-top: 5px;
    }

    #inputArea { display: flex; padding: 10px; gap: 5px; }

    input { padding: 10px; border-radius: 20px; border: 1px solid #ccc; }

    button {
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
💖 Dating App FINAL PRO ULTRA
<button onclick="toggleDark()">🌙</button>
</header>

<div class="top">
  <input id="name" placeholder="Enter name">
  <input id="photo" placeholder="Profile Image URL">
  <button onclick="addUser()">Enter</button>
</div>

<div class="container">
  <div id="usersPanel"></div>

  <div id="chatPanel">
    <div id="chatHeader">Select user</div>
    <div id="chat"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Message" onkeypress="handleEnter(event)">
      <input id="imgUrl" placeholder="Image URL">
      <button onclick="sendMsg()">Send</button>
      <button onclick="sendImageURL()">Img</button>

      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <button onclick="pickImage()">📎</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "lovedatingapp-70584.firebaseapp.com",
  projectId: "lovedatingapp-70584",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = "";
let selectedUser = "";

// ADD USER
function addUser() {
  let name = document.getElementById("name").value.trim();
  if (!name) return;

  currentUser = name;

  db.collection("users").doc(name).set({
    name,
    photo: "https://i.imgur.com/1X6G7YQ.png"
  });
}

// USERS
db.collection("users").onSnapshot(snap => {
  let div = document.getElementById("usersPanel");
  div.innerHTML = "";

  snap.forEach(doc => {
    let u = doc.data();
    if (u.name === currentUser) return;

    div.innerHTML += `
      <div onclick="selectUser('${u.name}')">
        <img src="${u.photo}">
        <b>${u.name}</b>
      </div>
    `;
  });
});

function selectUser(u) {
  selectedUser = u;
  loadChat();
}

// SEND TEXT
function sendMsg() {
  let msg = document.getElementById("msg").value;
  if (!msg || !selectedUser) return;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    text: msg,
    type: "text",
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

// SEND IMAGE URL
function sendImageURL() {
  let url = document.getElementById("imgUrl").value;
  if (!url || !selectedUser) return;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    img: url,
    type: "img",
    time: Date.now()
  });
}

// PICK IMAGE
function pickImage() {
  document.getElementById("fileInput").click();
}

// ✅ FIXED UPLOAD (MAIN)
document.getElementById("fileInput").addEventListener("change", function(e) {
  let file = e.target.files[0];
  if (!file || !selectedUser) return;

  let tempId = "temp" + Date.now();

  document.getElementById("chat").innerHTML += `
    <div class="msg me" id="${tempId}">Uploading...</div>
  `;

  let ref = storage.ref("chat/" + Date.now() + "_" + file.name);

  ref.put(file)
    .then(() => ref.getDownloadURL())
    .then(url => {

      document.getElementById(tempId).remove();

      db.collection("messages").add({
        from: currentUser,
        to: selectedUser,
        img: url,
        type: "img",
        time: Date.now()
      });

    })
    .catch(err => {
      alert("Upload error: " + err.message);
    });
});

// LOAD CHAT
function loadChat() {
  db.collection("messages").orderBy("time").onSnapshot(snap => {
    let div = document.getElementById("chat");
    div.innerHTML = "";

    snap.forEach(doc => {
      let m = doc.data();

      if (
        (m.from === currentUser && m.to === selectedUser) ||
        (m.from === selectedUser && m.to === currentUser)
      ) {
        let cls = m.from === currentUser ? "me" : "other";

        let content = m.type === "text"
          ? m.text
          : `<img src="${m.img}" class="chat-img">`;

        div.innerHTML += `<div class="msg ${cls}">${content}</div>`;
      }
    });
  });
}
</script>

</body>
</html>
