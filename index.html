
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dating App Final</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

#card{
  width:300px;
  height:400px;
  background:#222;
  margin:40px auto;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  white-space:pre-line;
}

button{
  padding:10px;
  margin:10px;
  border:none;
  border-radius:10px;
}

.like{background:green;}
.pass{background:red;}

#chat{display:none;}

.msg{
  padding:8px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.me{background:#0f0; margin-left:auto;}
.other{background:#333; margin-right:auto;}
</style>
</head>

<body>

<h2>🔥 Dating App Final</h2>

<div id="app">
  <div id="card">Loading...</div>
  <button class="pass" onclick="pass()">❌</button>
  <button class="like" onclick="like()">❤️</button>
</div>

<div id="chat">
  <h3>💬 Chat</h3>
  <div id="messages"></div>
  <input id="msg">
  <button onclick="sendMsg()">Send</button>
</div>

<script>

// 🔥 FIREBASE CONFIG
var firebaseConfig = {
  apiKey: "AIzaSyDVcQgFke5tSEU9BZk1YhZfSro7X_yIpg4",
  authDomain: "dating-app-d9a67.firebaseapp.com",
  databaseURL: "https://dating-app-d9a67-default-rtdb.firebaseio.com",
  projectId: "dating-app-d9a67",
  storageBucket: "dating-app-d9a67.firebasestorage.app",
  messagingSenderId: "338502840906",
  appId: "1:338502840906:web:b2b9c5b01ec7cf7c02acb3"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// 👤 LOGIN
var myId = localStorage.getItem("myId");
if(!myId){
  myId = prompt("Apna naam likho");
  localStorage.setItem("myId", myId);
}

// 👤 SAVE USER + ONLINE
db.ref("users/"+myId).set({
  name: myId,
  online: true
});

// offline detect
window.addEventListener("beforeunload", function(){
  db.ref("users/"+myId+"/online").set(false);
});

// 👥 LOAD USERS
var users = [];
var index = 0;
var currentUser = "";

db.ref("users").on("value", function(snap){
  var data = snap.val();

  if(!data){
    users = [];
  } else {
    users = Object.keys(data).filter(function(u){
      return u !== myId;
    });
  }

  index = 0;
  showUser();
});

// 👀 SHOW USER + STATUS
function showUser(){
  if(users.length === 0){
    document.getElementById("card").innerText = "No users";
    return;
  }

  currentUser = users[index];

  db.ref("users/"+currentUser).once("value", function(snap){
    var u = snap.val();
    var status = "⚫ Offline";

    if(u && u.online){
      status = "🟢 Online";
    }

    document.getElementById("card").innerText =
      currentUser + "\n" + status;
  });
}

// ⏭ NEXT
function next(){
  index++;
  if(index >= users.length) index=0;
  showUser();
}

// ❤️ LIKE + MATCH
function like(){
  db.ref("likes/"+myId+"/"+currentUser).set(true);

  db.ref("likes/"+currentUser+"/"+myId).once("value", function(snap){
    if(snap.exists()){
      alert("🔥 MATCH!");
      startChat(currentUser);
    } else {
      next();
    }
  });
}

// ❌ PASS
function pass(){
  next();
}

// 💬 CHAT
function startChat(user){
  document.getElementById("app").style.display="none";
  document.getElementById("chat").style.display="block";

  db.ref("messages/"+myId+"_"+user).on("value", function(snap){
    var data = snap.val() || {};
    var html = "";

    Object.values(data).forEach(function(m){
      if(m.sender === myId){
        html += "<div class='msg me'>"+m.text+"</div>";
      } else {
        html += "<div class='msg other'>"+m.text+"</div>";
      }
    });

    document.getElementById("messages").innerHTML = html;
  });
}

// 📩 SEND
function sendMsg(){
  var msg = document.getElementById("msg").value;
  if(!msg) return;

  var data = {text: msg, sender: myId};

  db.ref("messages/"+myId+"_"+currentUser).push(data);
  db.ref("messages/"+currentUser+"_"+myId).push(data);

  document.getElementById("msg").value="";
}

</script>

</body>
</html>
