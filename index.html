
<!DOCTYPE html>
<html>
<head>
  <title>Dating App</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

  <style>
    body { font-family: sans-serif; margin:0; background:#f2f2f2; }
    .screen { display:none; padding:10px; }
    .active { display:block; }
    .card { background:#fff; padding:10px; margin:10px; border-radius:10px; }
    img { border-radius:10px; }
    button { padding:10px; margin:5px; border:none; background:#ff4d6d; color:white; border-radius:5px; }
    input { padding:10px; margin:5px; width:90%; }
    .nav { position:fixed; bottom:0; width:100%; display:flex; background:#fff; }
    .nav button { flex:1; background:#eee; color:black; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <h2>Login</h2>
  <input id="name" placeholder="Enter name"><br>
  <button onclick="login()">Enter</button>
</div>

<!-- HOME (Swipe Users) -->
<div id="home" class="screen">
  <h2>Discover</h2>
  <div id="users"></div>
</div>

<!-- MATCHES -->
<div id="matches" class="screen">
  <h2>Matches</h2>
  <div id="matchList"></div>
</div>

<!-- CHAT -->
<div id="chat" class="screen">
  <h2>Chat</h2>
  <div id="messages"></div>
  <input id="msg">
  <button onclick="sendMsg()">Send</button>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
  <h2>Profile</h2>
  <input type="file" id="file">
  <button onclick="upload()">Upload Photo</button>
  <div id="myProfile"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="show('home')">Home</button>
  <button onclick="show('matches')">Matches</button>
  <button onclick="show('profile')">Profile</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET"
};
firebase.initializeApp(firebaseConfig);
let db = firebase.database();
let storage = firebase.storage();

let currentUserId = "";
let chatUser = "";

// LOGIN
function login() {
  let name = document.getElementById("name").value;
  currentUserId = "user_" + Date.now();

  db.ref("users/" + currentUserId).set({
    name: name,
    photo: ""
  });

  loadUsers();
  show("home");
}

// SWITCH SCREEN
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// LOAD USERS
function loadUsers(){
  db.ref("users").on("value", snap=>{
    let data = snap.val();
    let html = "";

    for(let uid in data){
      if(uid !== currentUserId){
        let u = data[uid];

        html += `
          <div class="card">
            <img src="${u.photo || 'https://via.placeholder.com/100'}" width="100"><br>
            ${u.name}<br>
            <button onclick="likeUser('${uid}')">Like ❤️</button>
          </div>
        `;
      }
    }
    document.getElementById("users").innerHTML = html;
  });
}

// LIKE + MATCH
function likeUser(uid){
  db.ref("likes/"+currentUserId+"/"+uid).set(true);

  db.ref("likes/"+uid+"/"+currentUserId).once("value", snap=>{
    if(snap.exists()){
      // MATCH
      db.ref("matches/"+currentUserId+"/"+uid).set(true);
      db.ref("matches/"+uid+"/"+currentUserId).set(true);

      sendNotification(uid,"You got a match!");
      alert("Matched!");
    }
  });
}

// LOAD MATCHES
db.ref("matches").on("value", snap=>{
  if(!currentUserId) return;
  let data = snap.val()?.[currentUserId];
  let html = "";

  for(let uid in data){
    db.ref("users/"+uid).once("value", s=>{
      let u = s.val();

      html += `
        <div class="card" onclick="openChat('${uid}')">
          <img src="${u.photo || 'https://via.placeholder.com/50'}" width="50">
          ${u.name}
        </div>
      `;
      document.getElementById("matchList").innerHTML = html;
    });
  }
});

// OPEN CHAT
function openChat(uid){
  chatUser = uid;
  show("chat");

  db.ref("chats/"+getChatId()).on("value", snap=>{
    let data = snap.val();
    let html = "";

    for(let id in data){
      html += `<p>${data[id].sender}: ${data[id].text}</p>`;
    }

    document.getElementById("messages").innerHTML = html;
  });
}

// SEND MSG
function sendMsg(){
  let text = document.getElementById("msg").value;

  db.ref("chats/"+getChatId()).push({
    sender: currentUserId,
    text: text
  });

  sendNotification(chatUser,"New Message!");
}

// CHAT ID
function getChatId(){
  return currentUserId < chatUser 
    ? currentUserId+"_"+chatUser 
    : chatUser+"_"+currentUserId;
}

// UPLOAD PHOTO
function upload(){
  let file = document.getElementById("file").files[0];
  let ref = storage.ref("profiles/"+file.name);

  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{
      db.ref("users/"+currentUserId).update({photo:url});
      alert("Uploaded!");
    });
  });
}

// NOTIFICATIONS
function sendNotification(uid,text){
  db.ref("notifications/"+uid).push({
    text:text,
    time:Date.now()
  });
}

</script>

</body>
</html>
