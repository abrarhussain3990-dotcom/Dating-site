<!DOCTYPE html>
<html>
<head>
  <title>💖 Dating App Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; background: #ece5dd; }

    header {
      background: #ff4d6d;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .top {
      padding: 10px;
      display: flex;
      gap: 5px;
      background: #fff;
    }

    .top input { flex: 1; padding: 10px; }

    .container {
      display: flex;
      height: calc(100vh - 100px);
    }

    #usersPanel {
      width: 35%;
      background: white;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }

    #usersPanel div {
      padding: 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    #usersPanel div.active { background: #ffe0e6; }

    #chatPanel {
      width: 65%;
      display: flex;
      flex-direction: column;
    }

    #chatHeader {
      padding: 10px;
      background: #f0f0f0;
      border-bottom: 1px solid #ddd;
    }

    #typing {
      font-size: 12px;
      color: gray;
      padding: 5px 10px;
      height: 20px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 12px;
      max-width: 70%;
      word-wrap: break-word;
    }

    .me {
      background: #ff4d6d;
      color: white;
      align-self: flex-end;
    }

    .other {
      background: #fff;
      align-self: flex-start;
    }

    .time {
      font-size: 10px;
      opacity: 0.6;
      display: block;
    }

    img.chat-img {
      max-width: 200px;
      border-radius: 10px;
      margin-top: 5px;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #f0f0f0;
      gap: 5px;
    }

    #msg, #imgUrl {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      #usersPanel { width: 100%; height: 40%; }
      #chatPanel { width: 100%; height: 60%; }
    }
  </style>
</head>

<body>

<header>💖 Dating App Pro</header>

<div class="top">
  <input id="name" placeholder="Enter your name">
  <button onclick="addUser()">Enter</button>
</div>

<div class="container">
  <div id="usersPanel"></div>

  <div id="chatPanel">
    <div id="chatHeader">Select user</div>
    <div id="typing"></div>
    <div id="chat"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Message">
      <input id="imgUrl" placeholder="Image URL (https://...)">

      <button onclick="sendMsg()">Send</button>
      <button onclick="sendImageURL()">Img</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "lovedatingapp-70584.firebaseapp.com",
  projectId: "lovedatingapp-70584",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";
let selectedUser = "";
let unsubscribeChat = null;

// TIME
function formatTime(ts) {
  let d = new Date(ts);
  return d.getHours() + ":" + String(d.getMinutes()).padStart(2, "0");
}

// ADD USER
function addUser() {
  let name = document.getElementById("name").value.trim();
  if (!name) return alert("Enter name!");

  currentUser = name;

  db.collection("users").doc(name).set({
    name,
    online: true,
    typing: false,
    lastSeen: Date.now()
  });

  document.getElementById("name").disabled = true;
}

// USERS
db.collection("users").onSnapshot(snapshot => {
  let usersDiv = document.getElementById("usersPanel");
  usersDiv.innerHTML = "";

  snapshot.forEach(doc => {
    let u = doc.data();
    if (u.name === currentUser) return;

    usersDiv.innerHTML += `
      <div onclick="selectUser('${u.name}', this)">
        <b>${u.name}</b>
      </div>
    `;
  });
});

// SELECT USER
function selectUser(user, el) {
  selectedUser = user;
  document.getElementById("chatHeader").innerText = user;

  document.querySelectorAll("#usersPanel div").forEach(d => d.classList.remove("active"));
  el.classList.add("active");

  listenTyping();
  loadChat();
}

// SEND TEXT
function sendMsg() {
  let msg = document.getElementById("msg").value.trim();
  if (!msg || !selectedUser) return;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    text: msg,
    seen: false,
    type: "text",
    time: Date.now()
  });

  document.getElementById("msg").value = "";

  setTyping(false);
}

// SEND IMAGE
function sendImageURL() {
  let url = document.getElementById("imgUrl").value.trim();
  if (!url || !selectedUser) return;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    img: url,
    seen: false,
    type: "img",
    time: Date.now()
  });

  document.getElementById("imgUrl").value = "";
}

// ENTER
document.getElementById("msg").addEventListener("input", function() {
  setTyping(true);
});

document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMsg();
});

// TYPING
function setTyping(state) {
  if (!selectedUser) return;

  db.collection("users").doc(currentUser).update({
    typing: state
  });
}

// LISTEN TYPING
function listenTyping() {
  db.collection("users").doc(selectedUser)
    .onSnapshot(doc => {
      let data = doc.data();
      document.getElementById("typing").innerText =
        data.typing ? "typing..." : "";
    });
}

// LOAD CHAT (WITH SEEN)
function loadChat() {

  if (unsubscribeChat) unsubscribeChat();

  unsubscribeChat = db.collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {

      let chatDiv = document.getElementById("chat");
      chatDiv.innerHTML = "";

      snapshot.forEach(doc => {
        let m = doc.data();

        if (
          (m.from === currentUser && m.to === selectedUser) ||
          (m.from === selectedUser && m.to === currentUser)
        ) {

          let cls = m.from === currentUser ? "me" : "other";

          // mark seen
          if (m.to === currentUser && !m.seen) {
            db.collection("messages").doc(doc.id).update({ seen: true });
          }

          let seen = (m.from === currentUser)
            ? (m.seen ? "✔✔" : "✔")
            : "";

          let content = m.type === "text"
            ? m.text
            : `<img src="${m.img}" class="chat-img">`;

          chatDiv.innerHTML += `
            <div class="msg ${cls}">
              ${content}
              <span class="time">${formatTime(m.time)} ${seen}</span>
            </div>
          `;
        }
      });

      chatDiv.scrollTop = chatDiv.scrollHeight;
    });
}
</script>

</body>
</html>
