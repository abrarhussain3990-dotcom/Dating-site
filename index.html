<!DOCTYPE html>
<html>
<head>
<title>Simple Dating</title>
<style>
body{font-family:Arial;text-align:center;background:#eee}
.card{background:#fff;padding:20px;margin:20px auto;width:300px;border-radius:10px}
img{width:100%;border-radius:10px}
button{padding:10px;margin:5px}
#chat{display:none}
.msg{margin:5px;padding:5px;border-radius:5px}
.me{background:#a0e7a0}
.other{background:#fff}
</style>
</head>

<body>

<h2>Dating App ❤️</h2>

<div id="app">
<div class="card">
<img id="pic">
<h3 id="name"></h3>
</div>

<button onclick="like()">❤️ Like</button>
<button onclick="next()">❌ Skip</button>

<div id="chat">
<h3>Chat</h3>
<div id="msgs"></div>
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"dating-app-21c55.firebaseapp.com",
projectId:"dating-app-21c55"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let me,users=[],i=0,chatId=null,unsub=null;

// AUTO PROFILE
if(!localStorage.getItem("me")){
let u={
id:Math.random().toString(36).substr(2,9),
name:"User"+Math.floor(Math.random()*1000),
pic:"https://randomuser.me/api/portraits/men/"+Math.floor(Math.random()*50)+".jpg"
};
localStorage.setItem("me",JSON.stringify(u));
}
me=JSON.parse(localStorage.getItem("me"));

// SAVE ME
db.collection("users").doc(me.id).set(me);

// FAKE USERS (once)
let fake=[
{name:"Ali",pic:"https://randomuser.me/api/portraits/men/1.jpg"},
{name:"Sara",pic:"https://randomuser.me/api/portraits/women/2.jpg"},
{name:"John",pic:"https://randomuser.me/api/portraits/men/3.jpg"}
];

fake.forEach(f=>{
let id="fake_"+f.name;
db.collection("users").doc(id).set({...f,id});
});

// LOAD USERS
db.collection("users").onSnapshot(s=>{
users=[];
s.forEach(d=>{
let u=d.data();
if(u.id!==me.id) users.push(u);
});
show();
});

// SHOW
function show(){
if(users.length==0) return;
let u=users[i%users.length];
document.getElementById("name").innerText=u.name;
document.getElementById("pic").src=u.pic;
}

// NEXT
function next(){
i++;
show();
}

// LIKE
async function like(){
let u=users[i%users.length];

await db.collection("likes").add({
from:me.id,to:u.id
});

let snap=await db.collection("likes")
.where("from","==",u.id)
.where("to","==",me.id).get();

if(!snap.empty){
chatId=[me.id,u.id].sort().join("_");
openChat();
alert("MATCH!");
}

next();
}

// CHAT
function openChat(){
document.getElementById("chat").style.display="block";

if(unsub)unsub();

unsub=db.collection("chats").doc(chatId)
.collection("msgs")
.orderBy("time")
.onSnapshot(s=>{
let box=document.getElementById("msgs");
box.innerHTML="";
s.forEach(d=>{
let m=d.data();
let cls=m.from===me.id?"me":"other";
box.innerHTML+=`<div class="msg ${cls}">${m.text}</div>`;
});
});
}

// SEND
function send(){
let text=document.getElementById("msg").value;
if(!text) return;

db.collection("chats").doc(chatId)
.collection("msgs")
.add({
text,from:me.id,time:Date.now()
});

document.getElementById("msg").value="";
}
</script>

</body>
</html><!DOCTYPE html>
<html>
<head>
  <title>Dating App</title>
  <style>
    body { font-family: Arial; text-align: center; background:#eee; }
    input, button { padding:10px; margin:5px; }
    .card { background:white; padding:20px; margin:20px; border-radius:10px; }
    #app { display:none; }
  </style>
</head>

<body>

<h2>Dating App ❤️</h2>

<div id="auth">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<div id="app">
  <div id="card" class="card"></div>

  <button onclick="passUser()">❌ Pass</button>
  <button onclick="likeUser()">❤️ Like</button>

  <h3>Matches</h3>
  <div id="matches"></div>

  <div id="chatBox" style="display:none;">
    <input id="msg" placeholder="Message">
    <button onclick="sendMsg()">Send</button>
    <div id="chat"></div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs, doc, setDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBGOFD_ukCDkeg5FPf8z_nP7yAzCZXCV7o",
  authDomain: "dating-app-21c55.firebaseapp.com",
  projectId: "dating-app-21c55",
  storageBucket: "dating-app-21c55.firebasestorage.app",
  messagingSenderId: "101828106221",
  appId: "1:101828106221:web:107966bcc50abe4579f9e4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let users = [];
let index = 0;
let chatUser = null;

// SIGNUP
window.signup = async () => {
  try {
    const email = emailInput();
    const pass = passInput();

    const u = await createUserWithEmailAndPassword(auth, email, pass);
    currentUser = u.user;

    await setDoc(doc(db, "users", currentUser.uid), { email });

    startApp();
  } catch(e){
    alert(e.message);
  }
};

// LOGIN
window.login = async () => {
  try {
    const email = emailInput();
    const pass = passInput();

    const u = await signInWithEmailAndPassword(auth, email, pass);
    currentUser = u.user;

    startApp();
  } catch(e){
    alert(e.message);
  }
};

function emailInput(){ return document.getElementById("email").value; }
function passInput(){ return document.getElementById("password").value; }

// START
async function startApp(){
  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="block";

  const snap = await getDocs(collection(db,"users"));
  users = [];

  snap.forEach(d=>{
    if(d.id !== currentUser.uid){
      users.push({id:d.id,...d.data()});
    }
  });

  index = 0;
  showUser();
  loadMatches();
}

// SHOW USER
function showUser(){
  const card = document.getElementById("card");

  if(index >= users.length){
    card.innerHTML = "No users found 😢";
    return;
  }

  const u = users[index];
  card.innerHTML = "<h3>"+u.email+"</h3>";
}

// LIKE
window.likeUser = async ()=>{
  const target = users[index];

  await addDoc(collection(db,"likes"),{
    from: currentUser.uid,
    to: target.id
  });

  const snap = await getDocs(collection(db,"likes"));
  let match = false;

  snap.forEach(d=>{
    const l = d.data();
    if(l.from === target.id && l.to === currentUser.uid){
      match = true;
    }
  });

  if(match){
    alert("🔥 Match!");
    await addDoc(collection(db,"matches"),{
      users:[currentUser.uid,target.id]
    });
    loadMatches();
  }

  index++;
  showUser();
};

// PASS
window.passUser = ()=>{
  index++;
  showUser();
};

// LOAD MATCHES
async function loadMatches(){
  const snap = await getDocs(collection(db,"matches"));
  const div = document.getElementById("matches");
  div.innerHTML = "";

  snap.forEach(d=>{
    const m = d.data();

    if(m.users.includes(currentUser.uid)){
      const other = m.users.find(u=>u!==currentUser.uid);

      const btn = document.createElement("button");
      btn.innerText = "Chat";
      btn.onclick = ()=>openChat(other);

      div.appendChild(btn);
    }
  });
}

// CHAT
function openChat(uid){
  chatUser = uid;
  document.getElementById("chatBox").style.display="block";

  onSnapshot(collection(db,"messages"),snap=>{
    const chat = document.getElementById("chat");
    chat.innerHTML="";

    snap.forEach(d=>{
      const m = d.data();

      if(
        (m.from===currentUser.uid && m.to===uid) ||
        (m.from===uid && m.to===currentUser.uid)
      ){
        const p = document.createElement("p");
        p.innerText = m.text;
        chat.appendChild(p);
      }
    });
  });
}

// SEND
window.sendMsg = async ()=>{
  const text = document.getElementById("msg").value;

  if(!text) return;

  await addDoc(collection(db,"messages"),{
    from: currentUser.uid,
    to: chatUser,
    text
  });

  document.getElementById("msg").value="";
};

</script>

</body>
</html>
