<!DOCTYPE html>
<html>
<head>
  <title>🔥 Real Dating App</title>
  <style>
    body { font-family: Arial; text-align: center; background:#f2f2f2; }

    .card {
      background:white;
      padding:20px;
      margin:20px auto;
      width:300px;
      border-radius:10px;
      box-shadow:0 0 10px gray;
    }

    img { width:100%; border-radius:10px; }

    button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .like { background:green; color:white; }
    .skip { background:red; color:white; }

    #chatBox { display:none; background:white; padding:10px; }
  </style>
</head>
<body>

<h2>🔥 Real Dating App</h2>

<!-- LOGIN -->
<div id="login">
  <input id="username" placeholder="Enter your name">
  <input id="userpic" placeholder="Enter image URL">
  <button onclick="login()">Enter App</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="card">
    <img id="profilePic">
    <h3 id="profileName"></h3>
  </div>

  <button class="like" onclick="like()">❤️ Like</button>
  <button class="skip" onclick="next()">❌ Skip</button>

  <div id="chatBox">
    <h3>💬 Chat</h3>
    <div id="messages" style="height:200px; overflow:auto;"></div>
    <input id="msg">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBGOFD_ukCDkeg5FPf8z_nP7yAzCZXCV7o",
  authDomain: "dating-app-21c55.firebaseapp.com",
  projectId: "dating-app-21c55",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = null;
let users = [];
let current = 0;
let matchedUser = null;
let chatId = null;

// LOGIN
async function login(){
  let name = document.getElementById("username").value;
  let pic = document.getElementById("userpic").value;

  if(!name || !pic){
    alert("Enter details");
    return;
  }

  currentUser = {
    id: Date.now().toString(),
    name,
    pic
  };

  await db.collection("users").doc(currentUser.id).set(currentUser);

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  loadUsers();
}

// LOAD USERS
async function loadUsers(){
  users = [];

  let snap = await db.collection("users").get();
  snap.forEach(doc => {
    let u = doc.data();
    if(u.id !== currentUser.id){
      users.push(u);
    }
  });

  showProfile();
}

// SHOW PROFILE
function showProfile(){
  if(users.length===0) return;

  document.getElementById("profileName").innerText = users[current].name;
  document.getElementById("profilePic").src = users[current].pic;
}

// NEXT
function next(){
  current = (current + 1) % users.length;
  showProfile();
}

// MATCH SYSTEM (REAL)
async function like(){
  matchedUser = users[current];

  let matchId = currentUser.id + "_" + matchedUser.id;

  await db.collection("matches").doc(matchId).set({
    users:[currentUser.id, matchedUser.id]
  });

  chatId = matchId;

  alert("🔥 Match with " + matchedUser.name);

  document.getElementById("chatBox").style.display="block";

  loadMessages();

  next();
}

// SEND MESSAGE
function sendMsg(){
  let msg = document.getElementById("msg").value;
  if(msg==="") return;

  db.collection("chats").doc(chatId).collection("messages").add({
    text: msg,
    sender: currentUser.name,
    time: Date.now()
  });

  document.getElementById("msg").value="";
}

// LOAD LIVE CHAT
function loadMessages(){
  db.collection("chats")
    .doc(chatId)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {

      document.getElementById("messages").innerHTML="";

      snapshot.forEach(doc => {
        let m = doc.data();

        document.getElementById("messages").innerHTML +=
          "<p><b>"+m.sender+":</b> "+m.text+"</p>";
      });

    });
}
</script>

</body>
</html
