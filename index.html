<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dating App</title>

<!-- Firebase v8 (IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

#card{
  width:300px;
  height:400px;
  background:#222;
  margin:40px auto;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  position:relative;
  transition:0.3s;
  user-select:none;
}

#likeLabel, #passLabel{
  position:absolute;
  top:20px;
  font-size:22px;
  opacity:0;
}

#likeLabel{ left:20px; color:lime; }
#passLabel{ right:20px; color:red; }

.buttons button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

.like{ background:green; }
.pass{ background:red; }

#chat{
  display:none;
}

#messages{
  height:200px;
  overflow:auto;
  border:1px solid #444;
  margin:10px;
  padding:10px;
}
</style>
</head>

<body>

<h2>🔥 Mini Dating App</h2>

<div id="app">
  <div id="card">
    <span id="name">Loading...</span>
    <div id="likeLabel">LIKE</div>
    <div id="passLabel">NOPE</div>
  </div>

  <div class="buttons">
    <button class="pass" onclick="pass()">❌</button>
    <button class="like" onclick="like()">❤️</button>
  </div>
</div>

<div id="chat">
  <h3>💬 Chat</h3>
  <div id="messages"></div>
  <input id="msg" placeholder="Type message">
  <button onclick="sendMsg()">Send</button>
</div>

<script>
// 🔥 YOUR FIREBASE CONFIG (ALREADY SET)
var firebaseConfig = {
  apiKey: "AIzaSyDVcQgFke5tSEU9BZk1YhZfSro7X_yIpg4",
  authDomain: "dating-app-d9a67.firebaseapp.com",
  databaseURL: "https://dating-app-d9a67-default-rtdb.firebaseio.com",
  projectId: "dating-app-d9a67",
  storageBucket: "dating-app-d9a67.firebasestorage.app",
  messagingSenderId: "338502840906",
  appId: "1:338502840906:web:b2b9c5b01ec7cf7c02acb3"
};

// ✅ INIT FIREBASE
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// 👤 user id
var myId = "user_" + Math.floor(Math.random()*10000);

// 👥 users
var users = ["Ali","Sara","Zain","Ayesha","Hina"];
var index = 0;
var currentUser = "";

// show user
function showUser(){
  currentUser = users[index];
  document.getElementById("name").innerText = currentUser;
}

// next user
function next(){
  index++;
  if(index >= users.length) index=0;

  document.getElementById("card").style.transform="translateX(0)";
  document.getElementById("likeLabel").style.opacity=0;
  document.getElementById("passLabel").style.opacity=0;

  showUser();
}

// ❤️ like
function like(){
  db.ref("likes/"+myId+"/"+currentUser).set(true);

  db.ref("likes/"+currentUser+"/"+myId).once("value", snap=>{
    if(snap.exists()){
      startChat(currentUser);
    } else {
      next();
    }
  });
}

// ❌ pass
function pass(){
  next();
}

// 💬 start chat
function startChat(user){
  document.getElementById("app").style.display="none";
  document.getElementById("chat").style.display="block";

  db.ref("messages/"+myId+"_"+user).on("value", snap=>{
    let data = snap.val() || {};
    let html="";
    Object.values(data).forEach(m=>{
      html += "<p>"+m+"</p>";
    });
    document.getElementById("messages").innerHTML = html;
  });
}

// 📩 send message
function sendMsg(){
  let msg = document.getElementById("msg").value;
  if(!msg) return;

  db.ref("messages/"+myId+"_"+currentUser).push(msg);
  db.ref("messages/"+currentUser+"_"+myId).push(msg);

  document.getElementById("msg").value="";
}

// 🔥 swipe system
let card = document.getElementById("card");
let startX = 0;

card.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

card.addEventListener("touchmove", e=>{
  let moveX = e.touches[0].clientX - startX;

  card.style.transform = "translateX("+moveX+"px) rotate("+(moveX/10)+"deg)";

  if(moveX > 50){
    document.getElementById("likeLabel").style.opacity=1;
  } else if(moveX < -50){
    document.getElementById("passLabel").style.opacity=1;
  }
});

card.addEventListener("touchend", e=>{
  let moveX = e.changedTouches[0].clientX - startX;

  if(moveX > 100){
    like();
  } else if(moveX < -100){
    pass();
  } else {
    card.style.transform="translateX(0)";
    document.getElementById("likeLabel").style.opacity=0;
    document.getElementById("passLabel").style.opacity=0;
  }
});

// init
window.onload = showUser;

</script>

</body>
</html>
