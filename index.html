
<!DOCTYPE html>
<html>
<head>
  <title>Dating App 💖</title>

  <style>
    body { font-family: Arial; background:#f2f2f2; text-align:center; }
    h1 { color: hotpink; }

    .card {
      width: 280px;
      margin: 20px auto;
      border-radius: 20px;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      padding: 15px;
    }

    .card img {
      width: 100%;
      border-radius: 15px;
    }

    button {
      padding: 10px;
      border-radius: 20px;
      border: none;
      margin: 5px;
    }

    .like { background: hotpink; color: white; }
    .nope { background: gray; color: white; }

    #chatScreen, #profileScreen { display:none; }

    #chatBox {
      height: 300px;
      overflow-y: scroll;
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

    .msg {
      padding: 8px;
      margin: 5px;
      border-radius: 10px;
      max-width: 70%;
    }

    .me { background: hotpink; color: white; margin-left:auto; }
    .other { background:#eee; margin-right:auto; }

    .nav {
      position: fixed;
      bottom:0;
      width:100%;
      display:flex;
      justify-content:space-around;
      background:white;
      padding:10px;
      border-top:1px solid #ddd;
    }
  </style>
</head>

<body>

<h1>💖 Dating App</h1>
<button onclick="login()">Login</button>

<!-- SWIPE -->
<div id="app" style="display:none;">
  <div class="card">
    <img id="photo">
    <h3 id="name"></h3>
  </div>

  <button class="nope" onclick="skip()">❌</button>
  <button class="like" onclick="like()">❤️</button>
</div>

<!-- CHAT -->
<div id="chatScreen">
  <h2>💬 Chat</h2>
  <div id="chatBox"></div>
  <input id="msg">
  <button onclick="sendMsg()">Send</button>
</div>

<!-- PROFILE -->
<div id="profileScreen">
  <h2>👤 Profile</h2>
  <input type="file" id="file">
  <button onclick="upload()">Upload Photo</button>
</div>

<div class="nav" id="nav" style="display:none;">
  <button onclick="showSwipe()">💖</button>
  <button onclick="showChat()">💬</button>
  <button onclick="showProfile()">👤</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc, setDoc,
  updateDoc, arrayUnion, getDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

// ✅ YOUR REAL CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBGOFD_ukCDkeg5FPf8z_nP7yAzCZXCV7o",
  authDomain: "dating-app-21c55.firebaseapp.com",
  projectId: "dating-app-21c55",
  storageBucket: "dating-app-21c55.firebasestorage.app",
  messagingSenderId: "101828106221",
  appId: "1:101828106221:web:a688cefbcfb1541a79f9e4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const provider = new GoogleAuthProvider();

let user, users = [], index = 0, chatId = "";

// LOGIN
window.login = async () => {
  const res = await signInWithPopup(auth, provider);
  user = res.user;

  await setDoc(doc(db, "users", user.uid), {
    uid: user.uid,
    name: user.displayName,
    photo: user.photoURL,
    likes: []
  });

  document.getElementById("app").style.display = "block";
  document.getElementById("nav").style.display = "flex";

  loadUsers();
};

// LOAD USERS
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  users = snap.docs.map(d => d.data());
  showUser();
}

// SHOW USER
function showUser() {
  const u = users[index];
  if (!u) return alert("No more users");

  document.getElementById("photo").src = u.photo;
  document.getElementById("name").innerText = u.name;
}

// LIKE
window.like = async () => {
  const target = users[index];

  await updateDoc(doc(db, "users", user.uid), {
    likes: arrayUnion(target.uid)
  });

  const snap = await getDoc(doc(db, "users", target.uid));

  if (snap.exists() && snap.data().likes?.includes(user.uid)) {
    alert("💖 MATCH!");
    chatId = user.uid + "_" + target.uid;
    showChat();
    listenChat();
  }

  index++;
  showUser();
};

// SKIP
window.skip = () => {
  index++;
  showUser();
};

// CHAT
function listenChat() {
  onSnapshot(doc(db, "chats", chatId), (snap) => {
    const box = document.getElementById("chatBox");
    box.innerHTML = "";

    if (snap.exists()) {
      snap.data().messages?.forEach(m => {
        const d = document.createElement("div");
        d.className = "msg " + (m.sender === user.uid ? "me" : "other");
        d.innerText = m.text;
        box.appendChild(d);
      });
    }
  });
}

window.sendMsg = async () => {
  const text = document.getElementById("msg").value;

  await setDoc(doc(db, "chats", chatId), {
    messages: arrayUnion({
      sender: user.uid,
      text
    })
  }, { merge: true });

  document.getElementById("msg").value = "";
};

// PROFILE
window.upload = async () => {
  const file = document.getElementById("file").files[0];
  const storageRef = ref(storage, "profiles/" + user.uid);

  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);

  await updateDoc(doc(db, "users", user.uid), {
    photo: url
  });

  alert("Profile Updated!");
};

// NAV
window.showSwipe = () => {
  app.style.display = "block";
  chatScreen.style.display = "none";
  profileScreen.style.display = "none";
};

window.showChat = () => {
  app.style.display = "none";
  chatScreen.style.display = "block";
  profileScreen.style.display = "none";
};

window.showProfile = () => {
  app.style.display = "none";
  chatScreen.style.display = "none";
  profileScreen.style.display = "block";
};

</script>

</body>
</html>
