<!DOCTYPE html>
<html>
<head>
  <title>🔥 Dating + Chat FINAL FIX</title>

  <style>
    body { font-family: Arial; text-align: center; background:#e5ddd5; }

    .card {
      background:white;
      padding:20px;
      margin:20px auto;
      width:300px;
      border-radius:10px;
      box-shadow:0 0 10px gray;
    }

    img { width:100%; border-radius:10px; }

    button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .like { background:green; color:white; }
    .skip { background:red; color:white; }

    #chatBox {
      display:none;
      background:#efeae2;
      padding:10px;
      border-radius:10px;
    }

    #messages {
      height:250px;
      overflow:auto;
      padding:10px;
    }

    .msg { padding:8px; margin:5px; border-radius:10px; max-width:70%; }
    .me { background:#dcf8c6; margin-left:auto; }
    .other { background:white; margin-right:auto; }
  </style>
</head>

<body>

<h2>🔥 FINAL WORKING APP</h2>

<div id="login">
  <input id="username" placeholder="Enter name"><br><br>
  <input type="file" id="cameraPic"><br><br>
  <button onclick="login()">Enter App</button>
</div>

<div id="app" style="display:none;">

  <div class="card">
    <img id="profilePic">
    <h3 id="profileName"></h3>
  </div>

  <button class="like" onclick="like()">❤️ Like</button>
  <button class="skip" onclick="next()">❌ Skip</button>

  <div id="chatBox">
    <h3>💬 Chat</h3>
    <div id="messages"></div>

    <input id="msg">
    <button onclick="sendMsg()">Send</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBGOFD_ukCDkeg5FPf8z_nP7yAzCZXCV7o",
  authDomain: "dating-app-21c55.firebaseapp.com",
  projectId: "dating-app-21c55",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser, users=[], current=0, chatId=null;

// 🔥 LOGIN (NO CRASH)
async function login(){

  let name=document.getElementById("username").value.trim();
  if(!name){ alert("Enter name"); return; }

  let pic="https://via.placeholder.com/300";

  let file=document.getElementById("cameraPic").files;
  if(file && file.length>0){
    pic=URL.createObjectURL(file[0]);
  }

  currentUser={
    id:Date.now().toString(),
    name,
    pic
  };

  await db.collection("users").doc(currentUser.id).set(currentUser);

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  loadUsers();
}

// 👥 REALTIME USERS
function loadUsers(){

  db.collection("users").onSnapshot(snap=>{

    users=[];

    snap.forEach(doc=>{
      let u=doc.data();
      if(u.id!==currentUser.id){
        users.push(u);
      }
    });

    if(users.length>0) showProfile();
  });
}

// 👤 SHOW
function showProfile(){
  let u=users[current];
  document.getElementById("profileName").innerText=u.name;
  document.getElementById("profilePic").src=u.pic;
}

// NEXT
function next(){
  if(users.length===0) return;
  current=(current+1)%users.length;
  showProfile();
}

// ❤️ MATCH (AUTO FOR TEST)
async function like(){

  let u=users[current];

  chatId=[currentUser.id,u.id].sort().join("_");

  document.getElementById("chatBox").style.display="block";

  loadMessages();

  next();
}

// 💬 SEND
function sendMsg(){

  if(!chatId) return;

  let msg=document.getElementById("msg").value;
  if(!msg) return;

  db.collection("chats")
  .doc(chatId)
  .collection("messages")
  .add({
    text:msg,
    senderId:currentUser.id,
    time:Date.now()
  });

  document.getElementById("msg").value="";
}

// 💬 LIVE CHAT
function loadMessages(){

  db.collection("chats")
  .doc(chatId)
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{

    let box=document.getElementById("messages");
    box.innerHTML="";

    snap.forEach(doc=>{
      let m=doc.data();

      let cls=(m.senderId===currentUser.id)?"me":"other";

      box.innerHTML+=`
      <div class="msg ${cls}">${m.text}</div>`;
    });

    box.scrollTop=box.scrollHeight;
  });
}
</script>

</body>
</html>
