<!DOCTYPE html><html>
<head>
  <title>💖 Dating App PRO MAX UPGRADED</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <style>
    body { font-family: Arial; margin: 0; background: #ece5dd; transition:0.3s; }
    .dark { background: #1e1e1e; color: white; }

    header {
      background: #ff4d6d;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .top { display:flex; gap:6px; padding:10px; background:#fff; flex-wrap:wrap; }
    .container { display:flex; height: calc(100vh - 120px); }

    #usersPanel { width:35%; background:#fff; overflow-y:auto; }
    #chatPanel { width:65%; display:flex; flex-direction:column; }

    #chat { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; }

    .msg { padding:10px; margin:5px; border-radius:10px; max-width:75%; position:relative; }
    .me { background:#ff4d6d; color:white; align-self:flex-end; }
    .other { background:#fff; align-self:flex-start; }

    .msg small { display:block; font-size:10px; opacity:0.7; margin-top:5px; }

    #inputArea { display:flex; gap:5px; padding:10px; }
    input, button { padding:10px; border-radius:20px; border:1px solid #ccc; }

    .user { padding:10px; cursor:pointer; border-bottom:1px solid #eee; }
    .user:hover { background:#f0f0f0; }

    .profilePic { width:30px; height:30px; border-radius:50%; object-fit:cover; margin-right:5px; }

    .onlineDot { color:green; }

    #typing { font-size:12px; color:gray; padding-left:10px; }

    .imgMsg { max-width:160px; border-radius:10px; margin-top:5px; }
  </style></head><body><header>
💖 Dating App PRO MAX 🚀
<button onclick="toggleDark()">🌙</button>
</header><div class="top">
  <input id="name" placeholder="Enter name">
  <input id="photo" placeholder="Profile Image URL">
  <button onclick="addUser()">Enter</button>
</div><div class="container">
  <div id="usersPanel"></div>  <div id="chatPanel">
    <div id="chatHeader">Chat Ready</div>
    <div id="typing"></div>
    <div id="chat"></div><div id="inputArea">
  <input id="msg" placeholder="Message">
  <input id="img" placeholder="Image URL">
  <button onclick="sendMsg()">Send</button>
</div>

  </div>
</div><audio id="msgSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script><script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "lovedatingapp-70584.firebaseapp.com",
  projectId: "lovedatingapp-70584",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";
let selectedUser = null;
let myPhoto = "";

function toggleDark(){ document.body.classList.toggle("dark"); }

/* ADD USER */
function addUser(){
  currentUser = document.getElementById("name").value;
  myPhoto = document.getElementById("photo").value;

  db.collection("users").doc(currentUser).set({
    photo: myPhoto,
    online: true,
    lastSeen: Date.now()
  });

  startListeners();
}

/* USERS LIST */
db.collection("users").onSnapshot(snap => {
  let div = document.getElementById("usersPanel");
  div.innerHTML = "";

  snap.forEach(doc => {
    if(doc.id === currentUser) return;

    let u = doc.data();

    div.innerHTML += `
      <div class='user' onclick="openChat('${doc.id}')">
        <img class='profilePic' src='${u.photo || "https://i.imgur.com/0y0y0y0.png"}'>
        <b>${doc.id}</b>
        <span class='onlineDot'>${u.online ? "🟢" : "⚪"}</span>
      </div>
    `;
  });
});

function openChat(user){
  selectedUser = user;
  document.getElementById("chatHeader").innerText = "Chat with " + user;
}

/* SEND MESSAGE */
function sendMsg(){
  let msg = document.getElementById("msg").value;
  let img = document.getElementById("img").value;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    text: msg,
    image: img || null,
    status: "sent",
    time: Date.now()
  });

  document.getElementById("msg").value = "";
  document.getElementById("img").value = "";
}

function startListeners(){

  db.collection("messages").orderBy("time").onSnapshot(snap => {

    let chat = document.getElementById("chat");
    chat.innerHTML = "";

    snap.forEach(doc => {
      let m = doc.data();

      if((m.from===currentUser && m.to===selectedUser) || (m.from===selectedUser && m.to===currentUser)){

        let cls = m.from===currentUser ? "me" : "other";

        if(m.to===currentUser && m.status!=="seen"){
          doc.ref.update({status:"seen"});
        }

        let tick = m.from===currentUser ? (m.status==="seen" ? "✔✔" : "✔") : "";

        chat.innerHTML += `
          <div class="msg ${cls}">
            ${m.text || ""}
            ${m.image ? `<br><img class='imgMsg' src='${m.image}'>` : ""}
            <small>${tick} ${new Date(m.time).toLocaleTimeString()}</small>
          </div>
        `;
      }
    });

    chat.scrollTop = chat.scrollHeight;
    document.getElementById("msgSound").play();
  });

  /* typing */
  document.getElementById("msg").addEventListener("input",()=>{
    db.collection("typing").doc(currentUser).set({to:selectedUser,typing:true});
    setTimeout(()=>{
      db.collection("typing").doc(currentUser).set({to:selectedUser,typing:false});
    },800);
  });

  db.collection("typing").onSnapshot(snap=>{
    snap.forEach(doc=>{
      let t=doc.data();
      if(doc.id===selectedUser && t.to===currentUser && t.typing){
        document.getElementById("typing").innerText="Typing...";
      } else {
        document.getElementById("typing").innerText="";
      }
    });
  });
}
</script></body>
</html>
