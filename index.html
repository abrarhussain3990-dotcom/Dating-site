
<!DOCTYPE html>
<html>
<head>
  <title>HeartLink 🔥</title>
<button onclick="like()">❤️ Like</button>
<button onclick="nextUser()">❌ Skip</button>
  <style>
    body { font-family: Arial; text-align:center; }

    #card {
      width: 250px;
      height: 300px;
      border: 2px solid #ccc;
      margin: 20px auto;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      border-radius:10px;
      position:relative;
      touch-action:none;
    }

    #chatBox {
      display:none;
      border-top:2px solid #ccc;
      padding:10px;
    }

    #messages {
      height:200px;
      overflow:auto;
      border:1px solid #ccc;
      margin-bottom:10px;
      text-align:left;
      padding:5px;
    }

    .me { text-align:right; color:blue; }
  </style>
</head>

<body>

<h2>HeartLink ❤️</h2>

<input id="username" placeholder="Your name">
<button onclick="start()">Start</button>

<div id="card">Swipe users 👇</div>

<div id="chatBox">
  <h3 id="chatWith"></h3>
  <div id="messages"></div>
  <input id="msg" placeholder="Type message">
  <button onclick="sendMsg()">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = "";
let users = ["user1","user2","user3"];
let currentProfile = "";

// START
window.start = function(){
  currentUser = document.getElementById("username").value.trim();

  if(!currentUser){
    alert("Enter your name!");
    return;
  }

  nextUser();
};

// SHOW USER
function nextUser(){
  currentProfile = users[Math.floor(Math.random()*users.length)];

  if(currentProfile === currentUser){
    return nextUser();
  }

  document.getElementById("card").innerText = currentProfile;
}

// SWIPE
let card = document.getElementById("card");
let startX = 0;

card.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

card.addEventListener("touchend", async e=>{
  let endX = e.changedTouches[0].clientX;

  if(endX - startX > 50){
    like();
  } else if(startX - endX > 50){
    nextUser();
  }
});

// LIKE
async function like(){
  if(!currentUser || !currentProfile) return;

  await set(ref(db, `swipes/${currentUser}/${currentProfile}`), true);

  let snap = await get(ref(db, `swipes/${currentProfile}/${currentUser}`));

  if(snap.exists()){
    alert("🔥 MATCH!");
    openChat();
  } else {
    nextUser();
  }
}

// CHAT ID
function chatId(a,b){
  return a < b ? a + "_" + b : b + "_" + a;
}

// OPEN CHAT
function openChat(){
  document.getElementById("chatBox").style.display="block";
  document.getElementById("chatWith").innerText = "Chat with " + currentProfile;

  let id = chatId(currentUser,currentProfile);

  onValue(ref(db,"chats/"+id),(snap)=>{
    let data = snap.val();
    let box = document.getElementById("messages");

    box.innerHTML="";

    if(!data) return;

    Object.values(data).forEach(msg=>{
      box.innerHTML += `<p class="${msg.sender===currentUser?'me':''}">${msg.text}</p>`;
    });
  });

  // ONLINE STATUS
  set(ref(db, "online/"+currentUser), true);
}

// SEND
window.sendMsg = function(){
  let text = document.getElementById("msg").value;

  if(!text) return;

  let id = chatId(currentUser,currentProfile);

  push(ref(db,"chats/"+id),{
    text: text,
    sender: currentUser,
    time: Date.now()
  });

  document.getElementById("msg").value="";
};

</script>

</body>
</html>
