<!DOCTYPE html>
<html>
<head>
  <title>💖 Dating App SIMPLE WORKING VERSION</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; background: #ece5dd; }
    header { background: #ff4d6d; color: white; padding: 15px; text-align: center; }

    .top { display: flex; padding: 10px; gap: 5px; background: white; }
    .top input { flex: 1; padding: 10px; }

    .container { display: flex; height: calc(100vh - 120px); }

    #users { width: 35%; background: white; overflow-y: auto; }
    #users div { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }

    #chatBox { width: 65%; display: flex; flex-direction: column; }

    #chat { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }

    .msg { padding: 10px; margin: 5px; border-radius: 10px; max-width: 70%; }
    .me { background: #ff4d6d; color: white; align-self: flex-end; }
    .other { background: white; align-self: flex-start; }

    #inputArea { display: flex; padding: 10px; gap: 5px; flex-wrap: wrap; }

    input { padding: 10px; border-radius: 20px; border: 1px solid #ccc; }

    button { padding: 10px; border-radius: 20px; border: none; background: #ff4d6d; color: white; }

    video { width: 120px; margin: 5px; }
  </style>
</head>

<body>

<header>💖 Dating App SIMPLE (WORKING)</header>

<div class="top">
  <input id="name" placeholder="Enter name">
  <button onclick="join()">Join</button>
</div>

<div class="container">

  <div id="users"></div>

  <div id="chatBox">
    <div id="title">Select user</div>
    <div id="chat"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Message" onkeypress="enter(event)">
      <button onclick="send()">Send</button>

      <button onclick="sendImage()">📷</button>
      <button onclick="recordVoice()">🎤</button>
      <button onclick="call()">📞</button>
    </div>

    <video id="local" autoplay muted></video>
    <video id="remote" autoplay></video>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_BUCKET"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let me = "";
let other = "";
let pc;

function chatId(){
  return [me, other].sort().join("_");
}

// JOIN
function join(){
  me = document.getElementById("name").value;
  if(!me) return;
  db.collection("users").doc(me).set({name:me});
}

// USERS
 db.collection("users").onSnapshot(snap=>{
  let box=document.getElementById("users");
  box.innerHTML="";

  snap.forEach(d=>{
    let u=d.data();
    if(u.name===me) return;
    box.innerHTML+=`<div onclick="openChat('${u.name}')">${u.name}</div>`;
  });
});

function openChat(u){
  other=u;
  document.getElementById("title").innerText=u;
  load();
}

// TEXT
function send(){
  let m=document.getElementById("msg").value;
  if(!m||!other) return;

  db.collection("messages").add({
    from:me,to:other,text:m,type:"text",chatId:chatId(),time:Date.now()
  });

  document.getElementById("msg").value="";
}

function enter(e){if(e.key=="Enter") send();}

// IMAGE (simple base64)
function sendImage(){
  let input=document.createElement("input");
  input.type="file";

  input.onchange=e=>{
    let file=e.target.files[0];
    let reader=new FileReader();

    reader.onload=()=>{
      db.collection("messages").add({
        from:me,to:other,image:reader.result,type:"image",chatId:chatId(),time:Date.now()
      });
    };

    reader.readAsDataURL(file);
  };

  input.click();
}

// VOICE (simple base64)
function recordVoice(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
    let r=new MediaRecorder(s);
    let chunks=[];

    r.ondataavailable=e=>chunks.push(e.data);

    r.onstop=()=>{
      let blob=new Blob(chunks);
      let reader=new FileReader();

      reader.onload=()=>{
        db.collection("messages").add({
          from:me,to:other,audio:reader.result,type:"audio",chatId:chatId(),time:Date.now()
        });
      };

      reader.readAsDataURL(blob);
    };

    r.start();
    setTimeout(()=>r.stop(),3000);
  });
}

// CALL (basic)
function createPC(){
  pc=new RTCPeerConnection();

  pc.ontrack=e=>{
    document.getElementById("remote").srcObject=e.streams[0];
  };

  navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(s=>{
    document.getElementById("local").srcObject=s;
    s.getTracks().forEach(t=>pc.addTrack(t,s));
  });
}

async function call(){
  if(!other) return;

  createPC();

  let offer=await pc.createOffer();
  await pc.setLocalDescription(offer);

  db.collection("calls").doc(chatId()).set({offer});
}

 db.collection("calls").onSnapshot(async snap=>{
  snap.forEach(async d=>{
    let data=d.data();

    if(!pc && data.offer) createPC();

    if(data.offer && d.id===chatId()){
      await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
      let ans=await pc.createAnswer();
      await pc.setLocalDescription(ans);

      db.collection("calls").doc(chatId()).set({answer:ans});
    }

    if(data.answer){
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
    }
  });
});

// LOAD CHAT
function load(){
  db.collection("messages").onSnapshot(snap=>{
    let box=document.getElementById("chat");
    box.innerHTML="";

    snap.forEach(d=>{
      let m=d.data();
      if(m.chatId!==chatId()) return;

      let cls=m.from===me?"me":"other";
      let html="";

      if(m.type=="text") html=m.text;
      if(m.type=="image") html=`<img src="${m.image}" width="150">`;
      if(m.type=="audio") html=`<audio controls src="${m.audio}"></audio>`;

      box.innerHTML+=`<div class="msg ${cls}">${html}</div>`;
    });
  });
}
</script>

</body>
</html>
