
<!DOCTYPE html>
<html>
<head>
  <title>Dating App</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>
</head>

<body>

<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<hr>

<h2>Profile</h2>
<input type="file" onchange="uploadImage(this.files[0])"><br><br>

<hr>

<h2>Discover</h2>
<div id="users"></div>

<hr>

<h2>Matches</h2>
<div id="matches"></div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser;

// SIGNUP
function signup(){
  let email = email.value;
  let password = password.value;

  auth.createUserWithEmailAndPassword(email, password)
  .then(res=>{
    currentUser = res.user;
    alert("Signup success");
  });
}

// LOGIN
function login(){
  let email = email.value;
  let password = password.value;

  auth.signInWithEmailAndPassword(email, password)
  .then(res=>{
    currentUser = res.user;
    alert("Login success");
    loadUsers();
  });
}

// UPLOAD PROFILE IMAGE
function uploadImage(file){
  const ref = storage.ref("profiles/" + currentUser.uid);

  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{
      db.collection("users").doc(currentUser.uid).set({
        uid: currentUser.uid,
        image: url
      });
      alert("Profile Uploaded");
    });
  });
}

// LOAD USERS (DISCOVER)
function loadUsers(){
  db.collection("users").get().then(snapshot=>{
    users.innerHTML = "";

    snapshot.forEach(doc=>{
      let data = doc.data();

      if(data.uid !== currentUser.uid){
        users.innerHTML += `
          <div>
            <img src="${data.image}" width="100"><br>
            <button onclick="likeUser('${data.uid}')">❤️ Like</button>
          </div>
        `;
      }
    });
  });
}

// LIKE SYSTEM
function likeUser(otherId){
  db.collection("likes").add({
    from: currentUser.uid,
    to: otherId
  });

  checkMatch(otherId);
}

// MATCH CHECK
function checkMatch(otherId){
  db.collection("likes")
  .where("from","==",otherId)
  .where("to","==",currentUser.uid)
  .get()
  .then(res=>{
    if(!res.empty){
      alert("It's a Match!");
      matches.innerHTML += `<p>Matched with ${otherId}</p>`;
    }
  });
}
</script>

</body>
</html>
