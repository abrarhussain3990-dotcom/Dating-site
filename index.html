<!DOCTYPE html>
<html>
<head>
  <title>💖 Chat FIXED VERSION</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; background: #ece5dd; }
    header { background:#ff4d6d; color:white; padding:15px; text-align:center; }

    .top { display:flex; gap:5px; padding:10px; background:white; }
    .top input { flex:1; padding:10px; }

    .container { display:flex; height:calc(100vh - 120px); }

    #usersPanel {
      width:35%;
      background:white;
      overflow-y:auto;
      border-right:1px solid #ddd;
    }

    #usersPanel div {
      padding:10px;
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      border-bottom:1px solid #eee;
    }

    #usersPanel img {
      width:40px;
      height:40px;
      border-radius:50%;
    }

    #chatPanel { width:65%; display:flex; flex-direction:column; }

    #chat { flex:1; padding:10px; overflow-y:auto; display:flex; flex-direction:column; }

    .msg { padding:10px; margin:5px; border-radius:10px; max-width:70%; }
    .me { background:#ff4d6d; color:white; align-self:flex-end; }
    .other { background:white; align-self:flex-start; }

    #inputArea { display:flex; gap:5px; padding:10px; }

    input { padding:10px; border-radius:20px; border:1px solid #ccc; }

    button { padding:10px; border-radius:20px; border:none; background:#ff4d6d; color:white; }
  </style>
</head>

<body>

<header>💖 FIXED CHAT APP</header>

<div class="top">
  <input id="name" placeholder="Enter name">
  <input id="photo" placeholder="Photo URL">
  <button onclick="addUser()">Enter</button>
</div>

<div class="container">

  <div id="usersPanel"></div>

  <div id="chatPanel">
    <div id="chatHeader">Select user</div>
    <div id="chat"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Message" onkeypress="enterSend(event)">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";
let selectedUser = "";
let unsub = null;

/* ================= USER SAVE ================= */
function addUser() {
  let name = document.getElementById("name").value.trim();
  let photo = document.getElementById("photo").value.trim();

  if (!name) return alert("Enter name!");

  currentUser = name;

  // SIMPLE SAFE SAVE (NO ISSUE)
  db.collection("users").doc(name).set({
    name: name,
    photo: photo || "https://i.imgur.com/1X6G7YQ.png",
    time: Date.now()
  });

  document.getElementById("name").disabled = true;
}

/* ================= SHOW USERS ================= */
db.collection("users").onSnapshot(snap => {
  let div = document.getElementById("usersPanel");
  div.innerHTML = "";

  snap.forEach(doc => {
    let u = doc.data();

    if (u.name === currentUser) return;

    div.innerHTML += `
      <div onclick="openChat('${u.name}')">
        <img src="${u.photo}">
        <b>${u.name}</b>
      </div>
    `;
  });
});

/* ================= OPEN CHAT ================= */
function openChat(user) {
  selectedUser = user;
  document.getElementById("chatHeader").innerText = "Chat with " + user;
  loadChat();
}

/* ================= CHAT ID ================= */
function chatId() {
  return [currentUser, selectedUser].sort().join("_");
}

/* ================= SEND MSG ================= */
function sendMsg() {
  let msg = document.getElementById("msg").value.trim();
  if (!selectedUser || !msg) return;

  db.collection("chats")
    .doc(chatId())
    .collection("messages")
    .add({
      from: currentUser,
      text: msg,
      time: Date.now()
    });

  document.getElementById("msg").value = "";
}

/* ================= ENTER ================= */
function enterSend(e) {
  if (e.key === "Enter") sendMsg();
}

/* ================= LOAD CHAT ================= */
function loadChat() {
  if (unsub) unsub();

  unsub = db.collection("chats")
    .doc(chatId())
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snap => {

      let chat = document.getElementById("chat");
      chat.innerHTML = "";

      snap.forEach(doc => {
        let m = doc.data();

        let cls = m.from === currentUser ? "me" : "other";

        chat.innerHTML += `<div class="msg ${cls}">${m.text}</div>`;
      });

      chat.scrollTop = chat.scrollHeight;
    });
}
</script>

</body>
</html>
