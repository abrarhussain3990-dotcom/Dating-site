<!DOCTYPE html>
<html>
<head>
  <title>Dating App</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f2f2f2; }
    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
    img { width: 100%; border-radius: 10px; }
    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .like { background: green; color: white; }
    .skip { background: red; color: white; }
    #chatBox {
      display:none;
      background:white;
      padding:10px;
      margin-top:20px;
    }
  </style>
</head>
<body>

<h2>🔥 Dating App</h2>

<div class="card" id="card">
  <img id="profilePic" src="">
  <h3 id="profileName"></h3>
</div>

<button class="like" onclick="like()">❤️ Like</button>
<button class="skip" onclick="next()">❌ Skip</button>

<div id="chatBox">
  <h3>💬 Chat</h3>
  <div id="messages"></div>
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMsg()">Send</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBGOFD_ukCDkeg5FPf8z_nP7yAzCZXCV7o",
  authDomain: "dating-app-21c55.firebaseapp.com",
  projectId: "dating-app-21c55",
  storageBucket: "dating-app-21c55.firebasestorage.app",
  messagingSenderId: "101828106221",
  appId: "1:101828106221:web:45ff810c81180e6679f9e4",
  measurementId: "G-B3WQ2KB49H"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Fake Profiles
let profiles = [
  {name:"Ayesha", pic:"https://i.pravatar.cc/300?img=5"},
  {name:"Sara", pic:"https://i.pravatar.cc/300?img=6"},
  {name:"Ali", pic:"https://i.pravatar.cc/300?img=7"},
  {name:"Zara", pic:"https://i.pravatar.cc/300?img=8"}
];

let current = 0;
let matchedUser = null;

// Show Profile
function showProfile() {
  document.getElementById("profileName").innerText = profiles[current].name;
  document.getElementById("profilePic").src = profiles[current].pic;
}

showProfile();

// Next Profile
function next() {
  current = (current + 1) % profiles.length;
  showProfile();
}

// Like = Match instantly (fake logic)
function like() {
  matchedUser = profiles[current];
  alert("🔥 It's a Match with " + matchedUser.name);
  document.getElementById("chatBox").style.display = "block";
}

// Send Message
function sendMsg() {
  let msg = document.getElementById("msg").value;
  if(msg === "") return;

  document.getElementById("messages").innerHTML += "<p><b>You:</b> " + msg + "</p>";

  // Fake reply
  setTimeout(() => {
    document.getElementById("messages").innerHTML += "<p><b>"+matchedUser.name+":</b> Hi 😄</p>";
  },1000);

  document.getElementById("msg").value = "";
}
</script>

</body>
</html>
