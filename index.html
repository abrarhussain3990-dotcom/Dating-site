<!DOCTYPE html>
<html>
<head>
  <title>Dating App 💖</title>

  <style>
    body { font-family: Arial; background:#f2f2f2; text-align:center; }

    .card {
      width: 280px;
      margin: 20px auto;
      border-radius: 20px;
      background: white;
      padding: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    img { width:100%; border-radius:15px; }

    button {
      padding:10px;
      border:none;
      border-radius:20px;
      margin:5px;
    }

    .like { background: hotpink; color:white; }
    .nope { background: gray; color:white; }

    #app, #chatScreen { display:none; }

    #chatBox {
      height:300px;
      overflow-y:scroll;
      background:white;
      padding:10px;
    }

    .msg { padding:8px; margin:5px; border-radius:10px; max-width:70%; }
    .me { background:hotpink; color:white; margin-left:auto; }
    .other { background:#eee; margin-right:auto; }
  </style>
</head>

<body>

<h2>💖 Create Profile</h2>

<input id="nameInput" placeholder="Your Name"><br><br>
<input type="file" id="file"><br><br>
<button onclick="createProfile()">Start</button>

<!-- APP -->
<div id="app">
  <div class="card">
    <img id="photo">
    <h3 id="name"></h3>
  </div>

  <button class="nope" onclick="skip()">❌</button>
  <button class="like" onclick="like()">❤️</button>
</div>

<!-- CHAT -->
<div id="chatScreen">
  <h2>💬 Chat</h2>
  <div id="chatBox"></div>
  <input id="msg">
  <button onclick="sendMsg()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, doc, setDoc,
  updateDoc, arrayUnion, getDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBGOFD_ukCDkeg5FPf8z_nP7yAzCZXCV7o",
  authDomain: "dating-app-21c55.firebaseapp.com",
  projectId: "dating-app-21c55",
  storageBucket: "dating-app-21c55.firebasestorage.app",
  messagingSenderId: "101828106221",
  appId: "1:101828106221:web:a688cefbcfb1541a79f9e4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let userId = "user_" + Math.random().toString(36).slice(2);
let users = [];
let index = 0;
let chatId = "";

// CREATE PROFILE
window.createProfile = async () => {
  const name = document.getElementById("nameInput").value;
  const file = document.getElementById("file").files[0];

  const storageRef = ref(storage, "profiles/" + userId);
  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);

  await setDoc(doc(db, "users", userId), {
    uid: userId,
    name,
    photo: url,
    likes: []
  });

  document.getElementById("app").style.display = "block";
  loadUsers();
};

// LOAD USERS
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  users = snap.docs.map(d => d.data());
  showUser();
}

// SHOW USER
function showUser() {
  const u = users[index];
  if (!u || u.uid === userId) {
    index++;
    return showUser();
  }

  document.getElementById("photo").src = u.photo;
  document.getElementById("name").innerText = u.name;
}

// LIKE
window.like = async () => {
  const target = users[index];

  await updateDoc(doc(db, "users", userId), {
    likes: arrayUnion(target.uid)
  });

  const snap = await getDoc(doc(db, "users", target.uid));

  if (snap.exists() && snap.data().likes?.includes(userId)) {
    alert("💖 MATCH!");
    chatId = userId + "_" + target.uid;
    openChat();
  }

  index++;
  showUser();
};

// SKIP
window.skip = () => {
  index++;
  showUser();
};

// CHAT
function openChat() {
  document.getElementById("app").style.display = "none";
  document.getElementById("chatScreen").style.display = "block";

  onSnapshot(doc(db, "chats", chatId), (snap) => {
    const box = document.getElementById("chatBox");
    box.innerHTML = "";

    if (snap.exists()) {
      snap.data().messages?.forEach(m => {
        const d = document.createElement("div");
        d.className = "msg " + (m.sender === userId ? "me" : "other");
        d.innerText = m.text;
        box.appendChild(d);
      });
    }
  });
}

// SEND MESSAGE
window.sendMsg = async () => {
  const text = document.getElementById("msg").value;

  await setDoc(doc(db, "chats", chatId), {
    messages: arrayUnion({
      sender: userId,
      text
    })
  }, { merge: true });

  document.getElementById("msg").value = "";
};

</script>

</body>
</html>
