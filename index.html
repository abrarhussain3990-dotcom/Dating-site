<script>
// EXISTING VARIABLES SAME
let currentUser = "";
let selectedUser = "";
let unsubscribeChat = null;
let typingTimeout = null;

// SEND MESSAGE (UPGRADED ✔✔)
function sendMsg() {
  let msg = document.getElementById("msg").value.trim();
  if (!msg || !selectedUser) return;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    text: msg,
    time: Date.now(),
    seen: false
  });

  document.getElementById("msg").value = "";

  // STOP TYPING STATUS
  db.collection("typing").doc(currentUser).set({
    to: selectedUser,
    typing: false
  });
}

// TYPING DETECT 🔥
document.getElementById("msg").addEventListener("input", () => {

  if (!selectedUser) return;

  db.collection("typing").doc(currentUser).set({
    to: selectedUser,
    typing: true
  });

  clearTimeout(typingTimeout);

  typingTimeout = setTimeout(() => {
    db.collection("typing").doc(currentUser).set({
      to: selectedUser,
      typing: false
    });
  }, 1000);
});

// SHOW TYPING STATUS
db.collection("typing").onSnapshot(snapshot => {
  snapshot.forEach(doc => {
    let t = doc.data();

    if (
      t.to === currentUser &&
      doc.id === selectedUser &&
      t.typing
    ) {
      document.getElementById("chatHeader").innerText =
        selectedUser + " is typing...";
    } else {
      document.getElementById("chatHeader").innerText = selectedUser;
    }
  });
});

// CHAT (UPGRADED WITH ✔✔)
function loadChat() {

  if (unsubscribeChat) unsubscribeChat();

  unsubscribeChat = db.collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {

      let chatDiv = document.getElementById("chat");
      chatDiv.innerHTML = "";

      snapshot.forEach(doc => {
        let m = doc.data();

        if (
          (m.from === currentUser && m.to === selectedUser) ||
          (m.from === selectedUser && m.to === currentUser)
        ) {

          let cls = m.from === currentUser ? "me" : "other";

          // ✔✔ logic
          let status = "";
          if (m.from === currentUser) {
            status = m.seen ? "✔✔" : "✔";
          }

          // MARK AS SEEN
          if (m.to === currentUser && !m.seen) {
            db.collection("messages").doc(doc.id).update({
              seen: true
            });
          }

          chatDiv.innerHTML += `
            <div class="msg ${cls}">
              ${m.text}
              <span class="time">
                ${formatTime(m.time)} ${status}
              </span>
            </div>
          `;
        }
      });

      chatDiv.scrollTop = chatDiv.scrollHeight;
    });
}
</script>
