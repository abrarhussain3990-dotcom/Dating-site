<!DOCTYPE html>
<html>
<head>
  <title>Dating App 🔥</title>
</head>
<body style="font-family: Arial; text-align:center;">

<h1>🔥 Welcome to Dating App 🔥</h1>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCoFPC3w3bGCyeBVpnOTNe3",
  authDomain: "dating-app-158f4.firebaseapp.com",
  projectId: "dating-app-158f4",
  storageBucket: "dating-app-158f4.appspot.com",
  messagingSenderId: "638828311733",
  appId: "1:638828311733:web:7054019414195549",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => alert("Signup successful 🔥"))
    .catch(err => alert(err.message));
}

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => alert("Login successful 🔥"))
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
