
<!DOCTYPE html>
<html>
<head>
  <title>Real Dating App</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f2f2f2; }
    input, button { padding: 10px; margin: 5px; }
    img { width: 100px; height: 100px; border-radius: 50%; }
    .card { background: white; padding: 10px; margin: 10px; border-radius: 10px; }
    #messages { height: 200px; overflow-y: scroll; background: white; margin: 10px; padding: 10px; }
  </style>
</head>

<body>

<h2>Dating App ❤️</h2>

<input type="text" id="name" placeholder="Enter your name"><br>
<input type="file" id="photo"><br>
<button onclick="createUser()">Enter App</button>

<hr>

<div id="users"></div>

<div id="chatBox" style="display:none;">
  <h3 id="chatWith"></h3>
  <div id="messages"></div>
  <input type="text" id="msg" placeholder="Type message">
  <button onclick="sendMsg()">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGOFD_ukCDkeg5FPf8z_nP7yAzCZXCV7o",
  authDomain: "dating-app-21c55.firebaseapp.com",
  projectId: "dating-app-21c55",
  storageBucket: "dating-app-21c55.firebasestorage.app",
  messagingSenderId: "101828106221",
  appId: "1:101828106221:web:cdabb70a284a945879f9e4",
  measurementId: "G-5663NW13F0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let myName = "";
let currentChat = "";

// CREATE USER
window.createUser = async function() {
  const name = document.getElementById("name").value;
  const photo = document.getElementById("photo").files[0];

  if(!name || !photo){
    alert("Enter name & photo");
    return;
  }

  myName = name;

  const reader = new FileReader();
  reader.onload = async function() {

    await addDoc(collection(db, "users"), {
      name: name,
      photo: reader.result
    });

    loadUsers();
  };

  reader.readAsDataURL(photo);
};

// LOAD USERS
async function loadUsers(){
  const querySnapshot = await getDocs(collection(db, "users"));
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  querySnapshot.forEach((doc)=>{
    const user = doc.data();

    if(user.name !== myName){
      usersDiv.innerHTML += `
        <div class="card">
          <img src="${user.photo}">
          <h3>${user.name}</h3>
          <button onclick="startChat('${user.name}')">Match ❤️</button>
        </div>
      `;
    }
  });
}

// START CHAT
window.startChat = function(name){
  currentChat = name;
  document.getElementById("chatBox").style.display = "block";
  document.getElementById("chatWith").innerText = "Chat with " + name;

  const chatId = [myName, name].sort().join("_");

  const q = query(collection(db, "messages"), orderBy("time"));

  onSnapshot(q, (snapshot)=>{
    const messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML = "";

    snapshot.forEach(doc=>{
      const data = doc.data();
      if(data.chatId === chatId){
        messagesDiv.innerHTML += `<p><b>${data.sender}:</b> ${data.text}</p>`;
      }
    });
  });
};

// SEND MESSAGE
window.sendMsg = async function(){
  const msg = document.getElementById("msg").value;

  if(!msg) return;

  const chatId = [myName, currentChat].sort().join("_");

  await addDoc(collection(db, "messages"), {
    chatId: chatId,
    sender: myName,
    text: msg,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
};

</script>

</body>
</html>
