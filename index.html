<!DOCTYPE html>
<html>
<head>
  <title>Simple Chat App</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #chatBox {
      width: 90%;
      max-width: 500px;
      height: 400px;
      background: white;
      overflow-y: auto;
      padding: 10px;
      border-radius: 10px;
      margin-top: 20px;
    }

    .msg {
      background: #e1f5fe;
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
    }

    #inputArea {
      display: flex;
      width: 90%;
      max-width: 500px;
      margin-top: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #2196f3;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<h2>🔥 Real Time Chat App</h2>

<div id="chatBox"></div>

<div id="inputArea">
  <input type="text" id="messageInput" placeholder="Type message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDVcQgFke5tSEU9BZk1YhZfSro7X_yIpg4",
  authDomain: "dating-app-d9a67.firebaseapp.com",
  databaseURL: "https://dating-app-d9a67-default-rtdb.firebaseio.com",
  projectId: "dating-app-d9a67",
  storageBucket: "dating-app-d9a67.firebasestorage.app",
  messagingSenderId: "338502840906",
  appId: "1:338502840906:web:2ab4d25b54f2c2e002acb3"
};

// init
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// reference
const messagesRef = ref(db, "messages");

// send message
window.sendMessage = function () {
  const input = document.getElementById("messageInput");
  const text = input.value;

  if (text.trim() === "") return;

  push(messagesRef, {
    text: text,
    time: Date.now()
  });

  input.value = "";
};

// receive messages
onValue(messagesRef, (snapshot) => {
  const chatBox = document.getElementById("chatBox");
  chatBox.innerHTML = "";

  snapshot.forEach((child) => {
    const msg = child.val();

    const div = document.createElement("div");
    div.classList.add("msg");
    div.innerText = msg.text;

    chatBox.appendChild(div);
  });

  chatBox.scrollTop = chatBox.scrollHeight;
});
</script>

</body>
</html>
