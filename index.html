<!DOCTYPE html>
<html>
<head>
  <title>💖 Dating App PRO MAX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; background: #ece5dd; }
    .dark { background: #1e1e1e; color: white; }

    header {
      background: #ff4d6d;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .top { display: flex; gap: 5px; padding: 10px; background: #fff; }
    .container { display: flex; height: calc(100vh - 120px); }

    #usersPanel { width: 35%; background: #fff; overflow-y: auto; }
    #chatPanel { width: 65%; display: flex; flex-direction: column; }

    #chat { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }

    .msg { padding: 10px; margin: 5px; border-radius: 10px; max-width: 70%; }
    .me { background: #ff4d6d; color: white; align-self: flex-end; }
    .other { background: #fff; align-self: flex-start; }

    .chat-img { max-width: 150px; border-radius: 10px; }

    #inputArea { display: flex; gap: 5px; padding: 10px; }
    input, button { padding: 10px; border-radius: 20px; }
  </style>
</head>

<body>

<header>
💖 Dating App PRO MAX
<button onclick="toggleDark()">🌙</button>
</header>

<div class="top">
  <input id="name" placeholder="Enter name">
  <input id="photo" placeholder="Profile Image URL">
  <button onclick="addUser()">Enter</button>
</div>

<div class="container">
  <div id="usersPanel"></div>

  <div id="chatPanel">
    <div id="chatHeader">Chat Ready</div>
    <div id="typing" style="font-size:12px;color:gray"></div>
    <div id="chat"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Message">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

<audio id="msgSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "lovedatingapp-70584.firebaseapp.com",
  projectId: "lovedatingapp-70584",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";
let selectedUser = null;

/* DARK */
function toggleDark() {
  document.body.classList.toggle("dark");
}

/* ADD USER */
function addUser() {
  currentUser = document.getElementById("name").value;

  db.collection("users").doc(currentUser).set({
    online: true,
    lastSeen: Date.now()
  });

  startListeners();
}

/* USERS */
db.collection("users").onSnapshot(snap => {
  let div = document.getElementById("usersPanel");
  div.innerHTML = "";

  snap.forEach(doc => {
    if (doc.id === currentUser) return;

    let u = doc.data();

    div.innerHTML += `
      <div onclick="openChat('${doc.id}')">
        <b>${doc.id}</b><br>
        <small>${u.online ? "🟢 Online" : "Last seen"}</small>
      </div>
    `;
  });
});

/* OPEN CHAT */
function openChat(user) {
  selectedUser = user;
  document.getElementById("chatHeader").innerText = "Chat with " + user;
}

/* SEND */
function sendMsg() {
  let msg = document.getElementById("msg").value;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    text: msg,
    status: "sent",
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

/* LISTENERS */
function startListeners() {

  // messages
  db.collection("messages").orderBy("time")
  .onSnapshot(snap => {

    let chat = document.getElementById("chat");
    chat.innerHTML = "";

    snap.forEach(doc => {
      let m = doc.data();

      if (
        (m.from === currentUser && m.to === selectedUser) ||
        (m.from === selectedUser && m.to === currentUser)
      ) {

        let cls = m.from === currentUser ? "me" : "other";

        // seen update
        if (m.to === currentUser && m.status !== "seen") {
          doc.ref.update({ status: "seen" });
        }

        let tick = m.from === currentUser
          ? (m.status === "seen" ? "✔✔" : "✔")
          : "";

        chat.innerHTML += `
          <div class="msg ${cls}">
            ${m.text}
            <div style="font-size:10px">${tick}</div>
          </div>
        `;
      }
    });

    chat.scrollTop = chat.scrollHeight;
  });

  // typing
  document.getElementById("msg").addEventListener("input", () => {
    db.collection("typing").doc(currentUser).set({
      to: selectedUser,
      typing: true
    });

    setTimeout(() => {
      db.collection("typing").doc(currentUser).set({
        to: selectedUser,
        typing: false
      });
    }, 1000);
  });

  db.collection("typing").onSnapshot(snap => {
    snap.forEach(doc => {
      let t = doc.data();

      if (doc.id === selectedUser && t.to === currentUser && t.typing) {
        document.getElementById("typing").innerText = "Typing...";
      } else {
        document.getElementById("typing").innerText = "";
      }
    });
  });

}
</script>

</body>
</html>
