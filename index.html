
<!DOCTYPE html>
<html>
<head>
  <title>My Real Chat App</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      text-align: center;
    }

    #chat {
      height: 300px;
      overflow-y: scroll;
      border: 1px solid #ccc;
      margin: 20px;
      padding: 10px;
      background: white;
    }

    input {
      padding: 10px;
      width: 60%;
    }

    button {
      padding: 10px;
    }
  </style>

  <!-- Firebase scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
</head>

<body>

  <h2>🔥 My Real Chat App</h2>

  <div id="chat"></div>

  <input type="text" id="msg" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>

  <script>
    // ✅ Tumhara original Firebase config (already correct 🔥)
    const firebaseConfig = {
      apiKey: "AIzaSyDVcQgFke5tSEU9BZk1YhZfSro7X_yIpg4",
      authDomain: "dating-app-d9a67.firebaseapp.com",
      databaseURL: "https://dating-app-d9a67-default-rtdb.firebaseio.com",
      projectId: "dating-app-d9a67",
      storageBucket: "dating-app-d9a67.firebasestorage.app",
      messagingSenderId: "338502840906",
      appId: "1:338502840906:web:63585ed184d8291402acb3"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function sendMessage() {
      let msg = document.getElementById("msg").value;
      let user = localStorage.getItem("user") || "User";

      db.ref("messages").push({
        name: user,
        text: msg
      });

      document.getElementById("msg").value = "";
    }

    db.ref("messages").on("child_added", function(data) {
      let msg = data.val();
      document.getElementById("chat").innerHTML += 
        "<p><b>" + msg.name + ":</b> " + msg.text + "</p>";
    });
  </script>

</body>
</html>
