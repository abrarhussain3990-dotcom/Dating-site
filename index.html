<!DOCTYPE html>
<html>
<head>
  <title>💖 Dating App Ultra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; background: #ece5dd; }

    header {
      background: #ff4d6d;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .top {
      padding: 10px;
      display: flex;
      gap: 5px;
      background: #fff;
    }

    .top input { flex: 1; padding: 10px; }

    .container { display: flex; height: calc(100vh - 120px); }

    #usersPanel {
      width: 35%;
      background: white;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }

    #usersPanel div {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #usersPanel img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    #usersPanel div.active { background: #ffe0e6; }

    #chatPanel { width: 65%; display: flex; flex-direction: column; }

    #chatHeader {
      padding: 10px;
      background: #f0f0f0;
    }

    #typing {
      font-size: 12px;
      color: gray;
      padding: 5px 10px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 12px;
      max-width: 70%;
    }

    .me { background: #ff4d6d; color: white; align-self: flex-end; }
    .other { background: #fff; align-self: flex-start; }

    .time { font-size: 10px; opacity: 0.6; display: block; }

    img.chat-img { max-width: 200px; border-radius: 10px; margin-top: 5px; }

    #inputArea {
      display: flex;
      padding: 10px;
      gap: 5px;
      background: #f0f0f0;
    }

    #msg, #imgUrl {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #ff4d6d;
      color: white;
    }
  </style>
</head>

<body>

<header>💖 Dating App Ultra</header>

<div class="top">
  <input id="name" placeholder="Enter name">
  <input id="photo" placeholder="Profile Image URL">
  <button onclick="addUser()">Enter</button>
</div>

<div class="container">
  <div id="usersPanel"></div>

  <div id="chatPanel">
    <div id="chatHeader">Select user</div>
    <div id="typing"></div>
    <div id="chat"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Message">
      <input id="imgUrl" placeholder="Image URL">

      <button onclick="sendMsg()">Send</button>
      <button onclick="sendImageURL()">Img</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "lovedatingapp-70584.firebaseapp.com",
  projectId: "lovedatingapp-70584",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";
let selectedUser = "";
let unsubscribeChat = null;

// ONLINE HEARTBEAT
setInterval(() => {
  if (currentUser) {
    db.collection("users").doc(currentUser).update({
      online: true,
      lastSeen: Date.now()
    });
  }
}, 5000);

// ADD USER
function addUser() {
  let name = document.getElementById("name").value.trim();
  let photo = document.getElementById("photo").value.trim();

  currentUser = name;

  db.collection("users").doc(name).set({
    name,
    photo: photo || "https://i.imgur.com/1X6G7YQ.png",
    online: true,
    typing: false,
    lastSeen: Date.now(),
    likes: []
  });

  document.getElementById("name").disabled = true;
}

// USERS LIST
db.collection("users").onSnapshot(snapshot => {
  let div = document.getElementById("usersPanel");
  div.innerHTML = "";

  snapshot.forEach(doc => {
    let u = doc.data();
    if (u.name === currentUser) return;

    let status = u.online ? "🟢" : "⚫";

    div.innerHTML += `
      <div onclick="selectUser('${u.name}', this)">
        <img src="${u.photo}">
        <div>
          <b>${u.name}</b><br>
          <small>${status}</small>
        </div>
        <button onclick="likeUser('${u.name}', event)">❤️</button>
      </div>
    `;
  });
});

// LIKE
function likeUser(user, e) {
  e.stopPropagation();

  db.collection("users").doc(currentUser).update({
    likes: firebase.firestore.FieldValue.arrayUnion(user)
  });

  alert("Liked " + user);
}

// SELECT USER
function selectUser(user, el) {
  selectedUser = user;
  document.getElementById("chatHeader").innerText = user;

  document.querySelectorAll("#usersPanel div").forEach(d => d.classList.remove("active"));
  el.classList.add("active");

  listenTyping();
  loadChat();
}

// SEND TEXT
function sendMsg() {
  let msg = document.getElementById("msg").value.trim();
  if (!msg) return;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    text: msg,
    seen: false,
    type: "text",
    time: Date.now()
  });

  document.getElementById("msg").value = "";
  setTyping(false);
}

// SEND IMAGE
function sendImageURL() {
  let url = document.getElementById("imgUrl").value.trim();
  if (!url) return;

  db.collection("messages").add({
    from: currentUser,
    to: selectedUser,
    img: url,
    seen: false,
    type: "img",
    time: Date.now()
  });

  document.getElementById("imgUrl").value = "";
}

// TYPING
document.getElementById("msg").addEventListener("input", () => setTyping(true));
document.getElementById("msg").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMsg();
});

function setTyping(state) {
  db.collection("users").doc(currentUser).update({ typing: state });
}

// LISTEN TYPING
function listenTyping() {
  db.collection("users").doc(selectedUser).onSnapshot(doc => {
    document.getElementById("typing").innerText =
      doc.data().typing ? "typing..." : "";
  });
}

// LOAD CHAT
function loadChat() {

  if (unsubscribeChat) unsubscribeChat();

  unsubscribeChat = db.collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {

      let chatDiv = document.getElementById("chat");
      chatDiv.innerHTML = "";

      snapshot.forEach(doc => {
        let m = doc.data();

        if (
          (m.from === currentUser && m.to === selectedUser) ||
          (m.from === selectedUser && m.to === currentUser)
        ) {

          if (m.to === currentUser && !m.seen) {
            db.collection("messages").doc(doc.id).update({ seen: true });
          }

          let seen = (m.from === currentUser)
            ? (m.seen ? "✔✔" : "✔")
            : "";

          let cls = m.from === currentUser ? "me" : "other";

          let content = m.type === "text"
            ? m.text
            : `<img src="${m.img}" class="chat-img">`;

          chatDiv.innerHTML += `
            <div class="msg ${cls}">
              ${content}
              <span class="time">${seen}</span>
            </div>
          `;
        }
      });

      chatDiv.scrollTop = chatDiv.scrollHeight;
    });
}
</script>

</body>
</html>
