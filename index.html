
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Dating App</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
var users = ["Ali", "Sara", "Zain", "Ayesha"];
<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
.card {
  width:300px; height:400px; background:#222;
  margin:20px auto; border-radius:20px;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; transition:0.3s;
}
.buttons button {
  padding:10px 20px; margin:10px;
  border:none; border-radius:10px;
  cursor:pointer; font-size:18px;
}
.like { background:green; }
.pass { background:red; }
#chat { display:none; }
</style>
</head>

<body>

<h2>Mini Dating App</h2>

<div id="app">
  <div id="card" class="card">User Loading...</div>
  
  <div class="buttons">
    <button class="pass" onclick="pass()">Pass ❌</button>
    <button class="like" onclick="like()">Like ❤️</button>
  </div>
</div>

<div id="chat">
  <h3>Chat</h3>
  <div id="messages"></div>
  <input id="msg" placeholder="Type message">
  <button onclick="sendMsg()">Send</button>
</div>

<script>
// 🔥 Firebase config (APNA YAHAN DALO)
var firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// 👤 Fake login (random user id)
var myId = "user_" + Math.floor(Math.random()*1000);

// 👥 Dummy users
var users = ["Ali", "Sara", "Zain", "Ayesha"];
var index = 0;
var currentUser = users[index];

// 🔄 Show user
function showUser() {
  currentUser = users[index];
  document.getElementById("card").innerText = currentUser;
}
showUser();

// ❤️ Like
function like() {
  db.ref("likes/"+myId+"/"+currentUser).set(true);

  // check match
  db.ref("likes/"+currentUser+"/"+myId).once("value", snap=>{
    if(snap.exists()){
      startChat(currentUser);
    } else {
      next();
    }
  });
}

// ❌ Pass
function pass(){
  next();
}

// ⏭ Next user
function next(){
  index++;
  if(index >= users.length) index=0;
  showUser();
}

// 💬 Chat start
function startChat(user){
  document.getElementById("app").style.display="none";
  document.getElementById("chat").style.display="block";

  db.ref("messages/"+myId+"_"+user).on("value", snap=>{
    let data = snap.val() || {};
    let html = "";
    Object.values(data).forEach(m=>{
      html += "<p>"+m+"</p>";
    });
    document.getElementById("messages").innerHTML = html;
  });
}

// 📩 Send msg
function sendMsg(){
  let msg = document.getElementById("msg").value;
  if(!msg) return;

  db.ref("messages/"+myId+"_"+currentUser).push(msg);
  db.ref("messages/"+currentUser+"_"+myId).push(msg);

  document.getElementById("msg").value="";
}
</script>

</body>
</html>
