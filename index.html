
<!DOCTYPE html>
<html>
<head>
  <title>Dating App</title>
</head>
<body>

<h2>Login / Signup</h2>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<hr>

<h2>Users</h2>
<div id="users"></div>

<hr>

<h2>Chat</h2>
<input id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
<div id="chat"></div>

<script type="module">

// Firebase import
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs, doc, setDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Config
const firebaseConfig = {
  apiKey: "AIzaSyBGOFD_ukCDkeg5FPf8z_nP7yAzCZXCV7o",
  authDomain: "dating-app-21c55.firebaseapp.com",
  projectId: "dating-app-21c55",
  storageBucket: "dating-app-21c55.firebasestorage.app",
  messagingSenderId: "101828106221",
  appId: "1:101828106221:web:107966bcc50abe4579f9e4"
};

// Init
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentChatUser = null;

// Signup
window.signup = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const userCred = await createUserWithEmailAndPassword(auth, email, password);
  currentUser = userCred.user;

  await setDoc(doc(db, "users", currentUser.uid), {
    email: email
  });

  alert("Signup success");
  loadUsers();
};

// Login
window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const userCred = await signInWithEmailAndPassword(auth, email, password);
  currentUser = userCred.user;

  alert("Login success");
  loadUsers();
};

// Load Users (Swipe style)
async function loadUsers() {
  const querySnapshot = await getDocs(collection(db, "users"));
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  querySnapshot.forEach((docSnap) => {
    if (docSnap.id !== currentUser.uid) {
      const user = docSnap.data();

      const div = document.createElement("div");
      div.innerHTML = `
        <p>${user.email}</p>
        <button onclick="likeUser('${docSnap.id}')">❤️ Like</button>
        <button onclick="startChat('${docSnap.id}')">💬 Chat</button>
        <hr>
      `;
      usersDiv.appendChild(div);
    }
  });
}

// Like system
window.likeUser = async (userId) => {
  await addDoc(collection(db, "likes"), {
    from: currentUser.uid,
    to: userId
  });

  alert("Liked ❤️");
};

// Start Chat
window.startChat = (userId) => {
  currentChatUser = userId;
  loadMessages();
};

// Send Message
window.sendMessage = async () => {
  const msg = document.getElementById("message").value;

  await addDoc(collection(db, "messages"), {
    from: currentUser.uid,
    to: currentChatUser,
    text: msg
  });

  document.getElementById("message").value = "";
};

// Load Messages (Realtime)
function loadMessages() {
  onSnapshot(collection(db, "messages"), (snapshot) => {
    const chatDiv = document.getElementById("chat");
    chatDiv.innerHTML = "";

    snapshot.forEach((docSnap) => {
      const msg = docSnap.data();

      if (
        (msg.from === currentUser.uid && msg.to === currentChatUser) ||
        (msg.from === currentChatUser && msg.to === currentUser.uid)
      ) {
        const p = document.createElement("p");
        p.innerText = msg.text;
        chatDiv.appendChild(p);
      }
    });
  });
}

</script>

</body>
</html>
