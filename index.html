<!DOCTYPE html>
<html>
<head>
  <title>Dating App</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
</head>

<body>

<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<hr>

<h2>Profile (Image URL)</h2>
<input id="imgUrl" placeholder="Paste image URL">
<button onclick="saveProfile()">Save Profile</button>

<hr>

<h2>Discover</h2>
<div id="card"></div>
<button onclick="like()">❤️ Like</button>
<button onclick="skip()">❌ Skip</button>

<hr>

<h2>Matches</h2>
<div id="matches"></div>

<hr>

<h2>Chat</h2>
<div id="chatBox"></div>
<input id="msgInput" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

<script>

// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser;
let usersList = [];
let currentIndex = 0;
let currentProfile = null;
let currentChatUser = null;

// SIGNUP
function signup(){
  auth.createUserWithEmailAndPassword(email.value, password.value)
  .then(res=>{
    currentUser = res.user;
    alert("Signup success");
  });
}

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .then(res=>{
    currentUser = res.user;
    alert("Login success");
    loadUsers();
    loadMatches();
  });
}

// SAVE PROFILE
function saveProfile(){
  db.collection("users").doc(currentUser.uid).set({
    uid: currentUser.uid,
    image: imgUrl.value
  });
  alert("Profile saved");
}

// LOAD USERS
function loadUsers(){
  db.collection("users").get().then(snapshot=>{
    usersList = [];

    snapshot.forEach(doc=>{
      let data = doc.data();
      if(data.uid !== currentUser.uid){
        usersList.push(data);
      }
    });

    showUser();
  });
}

// SHOW USER
function showUser(){
  if(usersList.length === 0){
    card.innerHTML = "No users";
    return;
  }

  currentProfile = usersList[currentIndex];

  card.innerHTML = `
    <img src="${currentProfile.image}" width="200">
    <p>${currentProfile.uid}</p>
  `;
}

// LIKE
function like(){
  db.collection("likes").add({
    from: currentUser.uid,
    to: currentProfile.uid
  });

  checkMatch(currentProfile.uid);
  nextUser();
}

// SKIP
function skip(){
  nextUser();
}

// NEXT USER
function nextUser(){
  currentIndex++;
  if(currentIndex >= usersList.length){
    currentIndex = 0;
  }
  showUser();
}

// MATCH CHECK
function checkMatch(otherId){
  db.collection("likes")
  .where("from","==",otherId)
  .where("to","==",currentUser.uid)
  .get()
  .then(res=>{
    if(!res.empty){
      alert("🔥 Match!");
      db.collection("matches").add({
        users: [currentUser.uid, otherId]
      });
      loadMatches();
    }
  });
}

// LOAD MATCHES
function loadMatches(){
  db.collection("matches").get().then(snapshot=>{
    matches.innerHTML = "";

    snapshot.forEach(doc=>{
      let data = doc.data();

      if(data.users.includes(currentUser.uid)){
        let other = data.users.find(u => u !== currentUser.uid);

        matches.innerHTML += `
          <p onclick="openChat('${other}')">
            💬 Chat with ${other}
          </p>
        `;
      }
    });
  });
}

// OPEN CHAT
function openChat(otherId){
  currentChatUser = otherId;
  loadMessages();
}

// SEND MESSAGE
function sendMsg(){
  let msg = msgInput.value;
  if(!msg) return;

  db.collection("messages").add({
    from: currentUser.uid,
    to: currentChatUser,
    text: msg,
    time: Date.now()
  });

  msgInput.value = "";
}

// LOAD MESSAGES
function loadMessages(){
  db.collection("messages")
  .orderBy("time")
  .onSnapshot(snapshot=>{
    chatBox.innerHTML = "";

    snapshot.forEach(doc=>{
      let d = doc.data();

      if(
        (d.from === currentUser.uid && d.to === currentChatUser) ||
        (d.from === currentChatUser && d.to === currentUser.uid)
      ){
        chatBox.innerHTML += `
          <p><b>${d.from === currentUser.uid ? "Me" : "Them"}:</b> ${d.text}</p>
        `;
      }
    });
  });
}

</script>

</body>
</html>
