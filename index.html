<!DOCTYPE html>
<html>
<head>
    <title>My Dating App</title>
    <style>
        body {
            font-family: Arial;
            background: #ff4d6d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #ff4d6d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #e6004c;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>❤️ Login</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    alert("Login successful ❤️ Next step will be match screen!");
}
</script>

</body>
</html>
