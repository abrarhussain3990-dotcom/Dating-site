<!DOCTYPE html>
<html>
<head>
  <title>💖 Dating App FINAL PRO ULTRA (FIXED)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; background: #ece5dd; }
    header { background: #ff4d6d; color: white; padding: 15px; text-align: center; }

    .top { padding: 10px; display: flex; gap: 5px; background: #fff; }
    .top input { flex: 1; padding: 10px; }

    .container { display: flex; height: calc(100vh - 120px); }

    #usersPanel { width: 35%; background: white; overflow-y: auto; }

    #usersPanel div {
      padding: 10px; border-bottom: 1px solid #eee;
      cursor: pointer; display: flex; align-items: center; gap: 10px;
    }

    #chatPanel { width: 65%; display: flex; flex-direction: column; }

    #chat { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }

    .msg { padding: 10px; margin: 5px; border-radius: 12px; max-width: 70%; }
    .me { background: #ff4d6d; color: white; align-self: flex-end; }
    .other { background: #fff; align-self: flex-start; }

    #inputArea { display: flex; padding: 10px; gap: 5px; flex-wrap: wrap; }

    input { padding: 10px; border-radius: 20px; border: 1px solid #ccc; }

    button {
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    video { width: 120px; margin: 5px; }
  </style>
</head>

<body>

<header>💖 Dating App ULTRA (FIXED)</header>

<div class="top">
  <input id="name" placeholder="Enter name">
  <button onclick="addUser()">Enter</button>
</div>

<div class="container">
  <div id="usersPanel"></div>

  <div id="chatPanel">
    <div id="chatHeader">Select user</div>
    <div id="chat"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Message" onkeypress="handleEnter(event)">
      <button onclick="sendMsg()">Send</button>

      <button onclick="startRecording()">🎤</button>
      <button onclick="startCall()">📞</button>
      <button onclick="endCall()">❌</button>
    </div>

    <video id="localVideo" autoplay muted></video>
    <video id="remoteVideo" autoplay></video>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "lovedatingapp-70584.firebaseapp.com",
  projectId: "lovedatingapp-70584",
  storageBucket: "lovedatingapp-70584.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = "";
let selectedUser = "";
let pc;

function getChatId() {
  return [currentUser, selectedUser].sort().join("_");
}

function addUser() {
  let name = document.getElementById("name").value.trim();
  if (!name) return;
  currentUser = name;
  db.collection("users").doc(name).set({ name });
}

// USERS
 db.collection("users").onSnapshot(snap => {
  let div = document.getElementById("usersPanel");
  div.innerHTML = "";

  snap.forEach(doc => {
    let u = doc.data();
    if (u.name === currentUser) return;

    div.innerHTML += `<div onclick="selectUser('${u.name}')"><b>${u.name}</b></div>`;
  });
});

function selectUser(u) {
  selectedUser = u;
  document.getElementById("chatHeader").innerText = u;
  loadChat();
}

// TEXT MSG
function sendMsg() {
  let msg = document.getElementById("msg").value;
  if (!msg || !selectedUser) return;

  db.collection("messages").add({
    chatId: getChatId(),
    from: currentUser,
    to: selectedUser,
    text: msg,
    type: "text",
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

function handleEnter(e) {
  if (e.key === "Enter") sendMsg();
}

// VOICE
function startRecording() {
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    let recorder = new MediaRecorder(stream);
    let chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = () => {
      let blob = new Blob(chunks);
      let ref = storage.ref("audio/" + Date.now());

      ref.put(blob).then(() => {
        ref.getDownloadURL().then(url => {
          db.collection("messages").add({
            chatId: getChatId(),
            from: currentUser,
            to: selectedUser,
            audio: url,
            type: "audio",
            time: Date.now()
          });
        });
      });
    };

    recorder.start();
    setTimeout(() => recorder.stop(), 3000);
  });
}

// CALL
function createPC() {
  pc = new RTCPeerConnection();

  pc.onicecandidate = e => {
    if (e.candidate) {
      db.collection("calls").doc(getChatId()).set({
        candidate: JSON.stringify(e.candidate)
      }, { merge: true });
    }
  };

  pc.ontrack = e => {
    document.getElementById("remoteVideo").srcObject = e.streams[0];
  };
}

async function startCall() {
  createPC();

  let stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  document.getElementById("localVideo").srcObject = stream;

  stream.getTracks().forEach(track => pc.addTrack(track, stream));

  let offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  db.collection("calls").doc(getChatId()).set({ offer }, { merge: true });
}

// LISTEN CALL
 db.collection("calls").onSnapshot(async snap => {
  snap.forEach(async doc => {
    let data = doc.data();

    if (!pc) createPC();

    if (data.offer && doc.id === getChatId()) {
      if (!pc.currentRemoteDescription) {
        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

        let answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        db.collection("calls").doc(getChatId()).set({ answer }, { merge: true });
      }
    }

    if (data.answer) {
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
    }

    if (data.candidate) {
      let candidate = new RTCIceCandidate(JSON.parse(data.candidate));
      pc.addIceCandidate(candidate);
    }
  });
});

function endCall() {
  if (pc) pc.close();
  alert("Call Ended");
}

// LOAD CHAT
function loadChat() {
  db.collection("messages")
    .where("chatId", "==", getChatId())
    .orderBy("time")
    .onSnapshot(snap => {
      let div = document.getElementById("chat");
      div.innerHTML = "";

      snap.forEach(doc => {
        let m = doc.data();
        let cls = m.from === currentUser ? "me" : "other";

        let content = "";

        if (m.type === "text") content = m.text;
        else if (m.type === "audio") content = `<audio controls src="${m.audio}"></audio>`;

        div.innerHTML += `<div class="msg ${cls}">${content}</div>`;
      });
    });
}
</script>

</body>
</html>
