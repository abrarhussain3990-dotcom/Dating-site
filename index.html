<!DOCTYPE html>
<html>
<head>
  <title>🔥 Dating App</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f2f2f2; }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }

    img { width: 100%; border-radius: 10px; }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .like { background: green; color: white; }
    .skip { background: red; color: white; }

    #chatBox {
      display:none;
      background:white;
      padding:10px;
      margin-top:20px;
    }
  </style>
</head>
<body>

<h2>🔥 Dating App</h2>

<div class="card">
  <img id="profilePic">
  <h3 id="profileName"></h3>
</div>

<button class="like" onclick="like()">❤️ Like</button>
<button class="skip" onclick="next()">❌ Skip</button>
<br>
<button onclick="addUser()">➕ Add Yourself</button>

<div id="chatBox">
  <h3>💬 Chat</h3>
  <div id="messages"></div>
  <input id="msg" placeholder="Type message...">
  <button onclick="sendMsg()">Send</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBGOFD_ukCDkeg5FPf8z_nP7yAzCZXCV7o",
  authDomain: "dating-app-21c55.firebaseapp.com",
  projectId: "dating-app-21c55",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Fake Profiles (20+)
let fakeProfiles = [];
for(let i=1;i<=30;i++){
  fakeProfiles.push({
    name: "User " + i,
    pic: "https://i.pravatar.cc/300?img=" + i
  });
}

let profiles = [];
let current = 0;
let matchedUser = null;

// Load users
async function loadUsers(){
  profiles = [...fakeProfiles];

  let snapshot = await db.collection("users").get();
  snapshot.forEach(doc => profiles.push(doc.data()));

  shuffle(profiles);
  showProfile();
}

// Shuffle
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    let j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

// Show profile
function showProfile(){
  document.getElementById("profileName").innerText = profiles[current].name;
  document.getElementById("profilePic").src = profiles[current].pic;
}

// Next
function next(){
  current = (current + 1) % profiles.length;
  showProfile();
}

// Match logic (realistic)
function like(){
  let chance = Math.random();

  if(chance < 0.4){
    matchedUser = profiles[current];
    alert("🔥 Match with " + matchedUser.name);
    document.getElementById("chatBox").style.display = "block";
  } else {
    alert("❌ No match");
  }

  next();
}

// Chat
function sendMsg(){
  let msg = document.getElementById("msg").value;
  if(msg==="") return;

  document.getElementById("messages").innerHTML += "<p><b>You:</b> "+msg+"</p>";
  document.getElementById("msg").value="";

  let replyChance = Math.random();

  if(replyChance < 0.7){
    let delay = Math.floor(Math.random()*5000)+1000;

    setTimeout(()=>{
      let replies = ["Hi 😄","How are you?","Nice to meet you","Haha 😂","Tell me more","Where are you from?"];
      let reply = replies[Math.floor(Math.random()*replies.length)];

      document.getElementById("messages").innerHTML += "<p><b>"+matchedUser.name+":</b> "+reply+"</p>";
    },delay);
  }
}

// Add real user
function addUser(){
  let name = prompt("Enter your name");
  let pic = prompt("Enter image URL");

  if(!name || !pic) return;

  db.collection("users").add({name, pic});
  alert("✅ Added! Reload app");
}

loadUsers();
</script>

</body>
</html>
