
<!DOCTYPE html>
<html>
<head>
  <title>🔥 Real Dating App FIXED</title>

  <style>
    body { font-family: Arial; text-align: center; background:#f2f2f2; }

    .card {
      background:white;
      padding:20px;
      margin:20px auto;
      width:300px;
      border-radius:10px;
      box-shadow:0 0 10px gray;
    }

    img { width:100%; border-radius:10px; }

    button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .like { background:green; color:white; }
    .skip { background:red; color:white; }

    #chatBox { display:none; background:white; padding:10px; margin-top:10px; }
  </style>
</head>

<body>

<h2>🔥 Real Dating App FIXED</h2>

<!-- LOGIN -->
<div id="login">
  <input id="username" placeholder="Enter your name"><br><br>
  <input id="userpic" placeholder="Enter image URL"><br><br>
  <button onclick="login()">Enter App</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="card">
    <img id="profilePic">
    <h3 id="profileName"></h3>
  </div>

  <button class="like" onclick="like()">❤️ Like</button>
  <button class="skip" onclick="next()">❌ Skip</button>

  <div id="chatBox">
    <h3>💬 Chat</h3>

    <div id="messages" style="height:200px; overflow:auto; border:1px solid #ccc;"></div>

    <input id="msg" placeholder="Type message">
    <button onclick="sendMsg()">Send</button>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBGOFD_ukCDkeg5FPf8z_nP7yAzCZXCV7o",
  authDomain: "dating-app-21c55.firebaseapp.com",
  projectId: "dating-app-21c55",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = null;
let users = [];
let current = 0;
let matchedUser = null;
let chatId = null;

// LOGIN
async function login(){

  let name = document.getElementById("username").value;
  let pic = document.getElementById("userpic").value;

  if(!name){
    alert("Enter name");
    return;
  }

  currentUser = {
    id: Date.now().toString(),
    name: name,
    pic: pic
  };

  await db.collection("users").doc(currentUser.id).set(currentUser);

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  loadUsers();
}

// LOAD USERS
async function loadUsers(){

  users = [];

  let snap = await db.collection("users").get();

  snap.forEach(doc => {
    let u = doc.data();
    if(u.id !== currentUser.id){
      users.push(u);
    }
  });

  if(users.length === 0){
    alert("No users found");
    return;
  }

  showProfile();
}

// SHOW PROFILE
function showProfile(){

  if(users.length === 0) return;

  let user = users[current];

  document.getElementById("profileName").innerText = user.name;

  document.getElementById("profilePic").src =
    user.pic || "https://via.placeholder.com/300";
}

// NEXT PROFILE
function next(){

  if(users.length === 0) return;

  current = (current + 1) % users.length;
  showProfile();
}

// ❤️ LIKE (FIXED MUTUAL MATCH)
async function like(){

  matchedUser = users[current];

  // save like
  await db.collection("likes").add({
    from: currentUser.id,
    to: matchedUser.id
  });

  // check mutual like
  let snap = await db.collection("likes")
    .where("from","==",matchedUser.id)
    .where("to","==",currentUser.id)
    .get();

  if(!snap.empty){

    chatId = [currentUser.id, matchedUser.id].sort().join("_");

    await db.collection("matches").doc(chatId).set({
      users:[currentUser.id, matchedUser.id]
    });

    alert("🔥 MATCH: " + matchedUser.name);

    document.getElementById("chatBox").style.display="block";

    loadMessages();
  }

  next();
}

// 💬 SEND MESSAGE
function sendMsg(){

  if(!chatId){
    alert("No match yet!");
    return;
  }

  let msg = document.getElementById("msg").value;

  if(msg === "") return;

  db.collection("chats")
    .doc(chatId)
    .collection("messages")
    .add({
      text: msg,
      sender: currentUser.name,
      time: Date.now()
    });

  document.getElementById("msg").value="";
}

// 💬 REALTIME CHAT
function loadMessages(){

  db.collection("chats")
    .doc(chatId)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {

      let box = document.getElementById("messages");
      box.innerHTML = "";

      snapshot.forEach(doc => {
        let m = doc.data();

        box.innerHTML +=
          "<p><b>" + m.sender + ":</b> " + m.text + "</p>";
      });

    });
}
</script>

</body>
</html>
