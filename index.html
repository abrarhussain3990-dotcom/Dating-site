<!DOCTYPE html>
<html>
<head>
  <title>💖 Dating App FINAL PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; background: #ece5dd; transition: 0.3s; }
    .dark { background: #1e1e1e; color: white; }

    header {
      background: #ff4d6d;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .top {
      padding: 10px;
      display: flex;
      gap: 5px;
      background: #fff;
    }

    .dark .top { background: #2c2c2c; }

    .top input { flex: 1; padding: 10px; }

    .container { display: flex; height: calc(100vh - 120px); }

    #usersPanel {
      width: 35%;
      background: white;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }

    .dark #usersPanel { background: #2c2c2c; }

    #usersPanel div {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #usersPanel img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    #chatPanel { width: 65%; display: flex; flex-direction: column; }

    #chat { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }

    .msg { padding: 10px; margin: 5px; border-radius: 12px; max-width: 70%; }

    .me { background: #ff4d6d; color: white; align-self: flex-end; }
    .other { background: #fff; align-self: flex-start; }

    .dark .other { background: #444; color: white; }

    .chat-img {
      max-width: 150px;
      border-radius: 10px;
      margin-top: 5px;
    }

    #inputArea { display: flex; padding: 10px; gap: 5px; }

    input { padding: 10px; border-radius: 20px; border: 1px solid #ccc; }

    button {
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
💖 Dating App FINAL PRO
<button onclick="toggleDark()">🌙</button>
</header>

<div class="top">
  <input id="name" placeholder="Enter name">
  <input id="photo" placeholder="Profile Image URL">
  <button onclick="addUser()">Enter</button>
</div>

<div class="container">
  <div id="usersPanel"></div>

  <div id="chatPanel">
    <div id="chatHeader">Select user or send directly</div>
    <div id="chat"></div>

    <div id="inputArea">
      <input id="msg" placeholder="Message" onkeypress="handleEnter(event)">
      <input id="imgUrl" placeholder="Image URL">
      <button onclick="sendMsg()">Send</button>
      <button onclick="sendImageURL()">Img</button>
    </div>
  </div>
</div>

<audio id="msgSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "lovedatingapp-70584.firebaseapp.com",
  projectId: "lovedatingapp-70584",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";
let selectedUser = null;
let lastSender = "";

/* DARK MODE */
function toggleDark() {
  document.body.classList.toggle("dark");
}

/* ADD USER */
function addUser() {
  let name = document.getElementById("name").value.trim();
  let photo = document.getElementById("photo").value.trim();

  if (!name) return alert("Enter name!");

  currentUser = name;

  db.collection("users").doc(name).set({
    name,
    photo: photo || "https://randomuser.me/api/portraits/men/1.jpg",
    online: true,
    lastSeen: Date.now()
  }, { merge: true });

  document.getElementById("name").disabled = true;
}

/* USERS LIST */
db.collection("users").onSnapshot(snapshot => {
  let div = document.getElementById("usersPanel");
  div.innerHTML = "";

  snapshot.forEach(doc => {
    let u = doc.data();
    if (u.name === currentUser) return;

    div.innerHTML += `
      <div onclick="openChat('${u.name}')">
        <img src="${u.photo}">
        <div><b>${u.name}</b></div>
      </div>
    `;
  });
});

/* OPEN CHAT */
function openChat(user) {
  selectedUser = user;
  document.getElementById("chatHeader").innerText = "Chat with " + user;
  loadMessages(); // 🔥 important
}

/* SEND MESSAGE */
function sendMsg() {
  let msg = document.getElementById("msg").value.trim();
  if (!msg) return;

  let to = selectedUser || prompt("Enter receiver name:");
  if (!to) return;

  db.collection("messages").add({
    from: currentUser,
    to: to,
    text: msg,
    type: "text",
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

/* SEND IMAGE */
function sendImageURL() {
  let url = document.getElementById("imgUrl").value.trim();
  if (!url.startsWith("http")) return;

  let to = selectedUser || prompt("Enter receiver name:");
  if (!to) return;

  db.collection("messages").add({
    from: currentUser,
    to: to,
    img: url,
    type: "img",
    time: Date.now()
  });

  document.getElementById("imgUrl").value = "";
}

/* ENTER KEY */
function handleEnter(e) {
  if (e.key === "Enter") sendMsg();
}

/* 🔥 NEW LOAD CHAT SYSTEM (FIXED) */
function loadMessages() {

  db.collection("messages")
  .orderBy("time")
  .onSnapshot(snapshot => {

    let chatDiv = document.getElementById("chat");
    chatDiv.innerHTML = "";
    lastSender = "";

    snapshot.forEach(doc => {
      let m = doc.data();

      if (
        (m.from === currentUser && m.to === selectedUser) ||
        (m.from === selectedUser && m.to === currentUser)
      ) {

        let cls = m.from === currentUser ? "me" : "other";

        let content = m.type === "text"
          ? m.text
          : `<img src="${m.img}" class="chat-img">`;

        let nameTag = "";
        if (lastSender !== m.from) {
          nameTag = `<div style="font-size:11px;color:gray">${m.from}</div>`;
          lastSender = m.from;
        }

        chatDiv.innerHTML += `
          ${nameTag}
          <div class="msg ${cls}">${content}</div>
        `;
      }
    });

    chatDiv.scrollTop = chatDiv.scrollHeight;
  });
}
</script>

</body>
</html>
