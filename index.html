
<!DOCTYPE html>
<html>
<head>
  <title>Dating App</title>
  <style>
    body{font-family:Arial;background:#111;color:white;text-align:center;}
    .nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#000;padding:10px;}
    .screen{display:none;}
    .active{display:block;}
    img{width:150px;height:150px;border-radius:50%;}
    #chat{height:200px;overflow:auto;background:#000;margin:10px;padding:10px;}
    input,button{padding:10px;margin:5px;border-radius:10px;}
  </style>
</head>
<body>

<h2>💘 Dating App</h2>

<!-- MATCH -->
<div id="match" class="screen active">
  <h3 id="uName">No users</h3>
  <img id="uImg"><p id="uInfo"></p>
  <button onclick="like()">❤️ Like</button>
  <button onclick="skip()">❌ Skip</button>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
  <h3>Create Profile</h3>
  <input id="name" placeholder="Name"><br>
  <input type="file" id="file"><br>
  <button onclick="saveProfile()">Save</button>
</div>

<!-- CHAT -->
<div id="chatBox" class="screen">
  <h3>Chat</h3>
  <div id="chat"></div>
  <input id="msg">
  <button onclick="sendMsg()">Send</button>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="show('match')">Match</button>
  <button onclick="show('profile')">Profile</button>
  <button onclick="show('chatBox')">Chat</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBGOFD_ukCDkeg5FPf8z_nP7yAzCZXCV7o",
  projectId: "dating-app-21c55"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user = {};
let users = [];
let index = 0;
let matchUser = null;
let imgData = "";

/* NAV */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* IMAGE */
file.onchange = e=>{
  let reader = new FileReader();
  reader.onload = ()=> imgData = reader.result;
  reader.readAsDataURL(e.target.files[0]);
};

/* SAVE PROFILE */
async function saveProfile(){

if(!document.getElementById("name").value.trim())
  user = { 
  name: document.getElementById("name").value.trim(), 
  photo: imgData 
};

  await db.collection("users").add(user);

  alert("Profile Saved!");
  loadUsers();
}

/* LOAD USERS */
async function loadUsers(){
  let snap = await db.collection("users").get();
  users = snap.docs.map(d=>d.data());

  /* FAKE USERS ADD */
  if(users.length < 3){
    users.push(
      {name:"Ayesha", photo:"https://randomuser.me/api/portraits/women/1.jpg"},
      {name:"Sara", photo:"https://randomuser.me/api/portraits/women/2.jpg"},
      {name:"Hina", photo:"https://randomuser.me/api/portraits/women/3.jpg"}
    );
  }

  index = 0;
  showUser();
}

/* SHOW USER */
function showUser(){
  if(users.length == 0){
    uName.innerText="No users found";
    return;
  }

  let u = users[index];
  uName.innerText = u.name;
  uImg.src = u.photo || "";
  uInfo.innerText = "Swipe or Like";
}

/* SKIP */
function skip(){
  index++;
  if(index >= users.length) index = 0;
  showUser();
}

/* LIKE */
function like(){
  matchUser = users[index];

  alert("💘 Match with " + matchUser.name);

  show("chatBox");
  listenChat();
}

/* SEND MESSAGE */
function sendMsg(){
  if(!msg.value) return;

  db.collection("messages").add({
    from:user.name,
    to:matchUser.name,
    text:msg.value,
    time:Date.now()
  });

  msg.value="";
  autoReply();
}

/* AUTO REPLY */
function autoReply(){
  let replies = ["Hi 😊","Kya kar rahe ho?","Nice 💕","Busy thi"];

  let r = replies[Math.floor(Math.random()*replies.length)];

  setTimeout(()=>{
    db.collection("messages").add({
      from:matchUser.name,
      to:user.name,
      text:r,
      time:Date.now()
    });
  },2000);
}

/* LISTEN CHAT */
function listenChat(){
  db.collection("messages").orderBy("time")
  .onSnapshot(snap=>{
    chat.innerHTML="";
    snap.forEach(doc=>{
      let m = doc.data();
      if(m.from==user.name || m.to==user.name){
        chat.innerHTML += `<p><b>${m.from}:</b> ${m.text}</p>`;
      }
    });
  });
}

/* INIT */
loadUsers();
</script>

</body>
</html>
