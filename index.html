
<!DOCTYPE html>
<html>
<head>
    <title>Dating App</title>
    <style>
        body {
            font-family: Arial;
            background: #ff4d6d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            width: 300px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            width: 45%;
            padding: 10px;
            margin: 10px 5px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .like {
            background: green;
        }

        .skip {
            background: gray;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>💘 Find Match</h2>

    <img id="pic" src="https://i.pravatar.cc/300?img=1">

    <h3 id="name">Ayesha</h3>

    <button class="like" onclick="like()">Like ❤️</button>
    <button class="skip" onclick="skip()">Skip ❌</button>
</div>

<script>
let users = [
    {name:"Ayesha", img:"https://i.pravatar.cc/300?img=1"},
    {name:"Sara", img:"https://i.pravatar.cc/300?img=2"},
    {name:"Zainab", img:"https://i.pravatar.cc/300?img=3"},
    {name:"Hina", img:"https://i.pravatar.cc/300?img=4"}
];

let i = 0;

function showUser() {
    document.getElementById("name").innerText = users[i].name;
    document.getElementById("pic").src = users[i].img;
}

function like() {
    alert("💖 You liked " + users[i].name);
    next();
}

function skip() {
    next();
}

function next() {
    i++;
    if(i >= users.length) {
        i = 0;
    }
    showUser();
}

showUser();
</script>

</body>
</html>
